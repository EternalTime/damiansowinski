<!-- Quantum Harmonic Oscillator Applet Include -->

<style>
#qho-scrollable {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border-dark) var(--bg-dark);
}
#qho-scrollable::-webkit-scrollbar { width: 4px; }
#qho-scrollable::-webkit-scrollbar-track { background: var(--bg-dark); }
#qho-scrollable::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 2px; }

.qho-eigen-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px;
}
.qho-eigen-label {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: calc(14px * var(--shell-fs, 1));
  color: var(--text-dim);
  width: 26px;
  flex-shrink: 0;
  text-align: right;
}
.qho-eigen-row input[type=range] {
  flex: 1;
  min-width: 0;
  accent-color: var(--teal-light);
}
.qho-gauge-wrap {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
  cursor: pointer;
  user-select: none;
  touch-action: none;
}
.qho-gauge-svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}
</style>

<script>
(function () {
  'use strict';

  /* ── Palette ── */
  const _cs = getComputedStyle(document.documentElement);
  const _c   = n => _cs.getPropertyValue(n).trim();
  const _rgb  = n => { const h = _c(n).replace('#',''); const v = parseInt(h,16); return [(v>>16)&0xFF,(v>>8)&0xFF,v&0xFF]; };
  const _rgba = (n, a) => { const [r,g,b] = _rgb(n); return `rgba(${r},${g},${b},${a})`; };

  const TEAL_DARK  = _c('--teal-dark');
  const TEAL_LIGHT = _c('--teal-light');
  const CYAN       = _c('--cyan');
  const PINK_LIGHT = _c('--pink-light');
  const PINK_DARK  = _c('--pink-dark');
  const BG         = _c('--bg-canvas');

  const [_TLR, _TLG, _TLB] = _rgb('--teal-light');
  const [_PLR, _PLG, _PLB] = _rgb('--pink-light');

  /* ── Physics constants (ℏ = m = ω = 1) ── */
  const N_STATES = 15;
  const XMAX     = 5.0;    // domain: x ∈ [−XMAX, XMAX]
  const PSI_YMAX = 1.5;    // y-axis half-range for wavefunction plot
  const PDF_YMIN = -0.5;   // y-axis min for probability density plot
  const PDF_YMAX = 1.75;   // y-axis max for probability density plot
  function energy(n) { return n + 0.5; }  // Eₙ = (n + ½)ℏω

  /* ── Simulation state ── */
  let canvas, ctx;
  let S = 500;
  let running  = false;
  let frameId  = null;
  let simTime  = 0;
  let simSpeed = 0.5;

  const amp   = new Float64Array(N_STATES);
  const phase = new Float64Array(N_STATES);

  /* ── Draw-PDF mode state ── */
  let drawMode    = false;
  let drawActive  = false;
  let drawPoints  = [];

  /* ── Gauge drag state ── */
  let gaugeDragging       = -1;
  let gaugeDragStartAngle = 0;
  let gaugeDragStartPhase = 0;

  /* ── QHO basis: all N_STATES ψₙ(x) via numerically stable recurrence ──
     ψ₀ = π^(−1/4) exp(−x²/2)
     ψ₁ = √2 · x · ψ₀
     ψₙ = √(2/n)·x·ψₙ₋₁ − √((n−1)/n)·ψₙ₋₂  */
  function computeBasisAt(x) {
    const psi  = new Float64Array(N_STATES);
    const gaus = Math.exp(-x * x / 2);
    psi[0] = Math.pow(Math.PI, -0.25) * gaus;
    if (N_STATES > 1) psi[1] = Math.SQRT2 * x * psi[0];
    for (let n = 1; n < N_STATES - 1; n++) {
      psi[n + 1] = Math.sqrt(2 / (n + 1)) * x * psi[n]
                 - Math.sqrt(n / (n + 1))  * psi[n - 1];
    }
    return psi;
  }

  /* ── Normalisation ── */
  function normFactor() {
    let s = 0;
    for (let i = 0; i < N_STATES; i++) s += amp[i] * amp[i];
    return s > 1e-12 ? 1 / Math.sqrt(s) : 0;
  }

  /* ── Evaluate ψ(x,t) ── */
  function evalPsi(x, t) {
    const nf  = normFactor();
    const psi = computeBasisAt(x);
    let re = 0, im = 0;
    for (let i = 0; i < N_STATES; i++) {
      if (amp[i] < 1e-9) continue;
      const cn  = amp[i] * nf;
      const phi = phase[i] - energy(i) * t;
      re += cn * Math.cos(phi) * psi[i];
      im += cn * Math.sin(phi) * psi[i];
    }
    return { re, im };
  }

  /* ── Init ── */
  function init() {
    simTime = 0;
    for (let i = 0; i < N_STATES; i++) { amp[i] = (i === 0) ? 1.0 : 0.0; phase[i] = 0.0; }
    syncSliders();
    updateGaugeArrows(0);
  }

  function syncSliders() {
    for (let i = 0; i < N_STATES; i++) {
      const sl = document.getElementById('qho-amp-' + i);
      if (sl) sl.value = amp[i];
    }
  }

  /* ── Projection: cₙ = ∫ f(x)·ψₙ(x) dx over [−XMAX, XMAX] ── */
  const NQ = 500;
  function projectFunction(fVals) {
    // fVals[k] = f(−XMAX + 2·XMAX·k/NQ),  k = 0 … NQ
    const dx   = 2 * XMAX / NQ;
    const sums = new Float64Array(N_STATES);
    for (let k = 0; k <= NQ; k++) {
      const xp  = -XMAX + dx * k;
      const w   = (k === 0 || k === NQ) ? 0.5 : 1.0;
      const psi = computeBasisAt(xp);
      const fk  = fVals[k];
      for (let i = 0; i < N_STATES; i++) sums[i] += w * fk * psi[i];
    }
    for (let i = 0; i < N_STATES; i++) {
      sums[i] *= dx;
      amp[i]   = Math.abs(sums[i]);
      phase[i] = sums[i] < 0 ? Math.PI : 0;
    }
    const mx = Math.max(...amp);
    if (mx > 1e-12) for (let i = 0; i < N_STATES; i++) amp[i] /= mx;
    syncSliders();
    updateGaugeArrows(simTime);
  }

  /* ── Preset: Coherent state — Gaussian displaced from centre ── */
  function presetCoherent() {
    exitDrawMode();
    simTime = 0;
    const x0  = (Math.random() * 2 - 1) * 2.5;   // random in [−2.5, 2.5]
    const dx  = 2 * XMAX / NQ;
    const fVals = new Float64Array(NQ + 1);
    for (let k = 0; k <= NQ; k++) {
      const x = -XMAX + dx * k;
      fVals[k] = Math.exp(-(x - x0) * (x - x0) / 2);
    }
    projectFunction(fVals);
  }

  /* ── Preset: Squeezed state — narrower Gaussian at centre ── */
  function presetSqueezed() {
    exitDrawMode();
    simTime = 0;
    const sigma = 0.40;   // narrower than ψ₀ (σ₀ = 1/√2 ≈ 0.707)
    const dx    = 2 * XMAX / NQ;
    const fVals = new Float64Array(NQ + 1);
    for (let k = 0; k <= NQ; k++) {
      const x = -XMAX + dx * k;
      fVals[k] = Math.exp(-x * x / (2 * sigma * sigma));
    }
    projectFunction(fVals);
  }

  /* ── Draw PDF mode ── */
  function enterDrawMode() {
    drawMode   = true;
    drawPoints = [];
    if (canvas) canvas.style.cursor = 'crosshair';
    const btn = document.getElementById('qho-draw-btn');
    if (btn) btn.classList.add('active-pink');
  }

  function exitDrawMode() {
    drawMode   = false;
    drawActive = false;
    drawPoints = [];
    if (canvas) canvas.style.cursor = '';
    const btn = document.getElementById('qho-draw-btn');
    if (btn) btn.classList.remove('active-pink');
  }

  function toggleDrawMode() {
    if (drawMode) { exitDrawMode(); return; }
    enterDrawMode();
  }

  /* ── Canvas coord helpers ── */
  function getCanvasCoords(evt) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width  / rect.width;
    const scaleY = canvas.height / rect.height;
    const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
    const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
    return {
      cx: (clientX - rect.left) * scaleX,
      cy: (clientY - rect.top)  * scaleY,
    };
  }

  /* Canvas pixel → physics coords on the prob plot  (x ∈ [−XMAX, XMAX]) */
  function canvasToProbCoords(cx, cy) {
    const L  = getLayout();
    const xp = ((cx - L.p2x) / L.p2w) * 2 * XMAX - XMAX;
    const yf = PDF_YMIN + (PDF_YMAX - PDF_YMIN) * (1 - (cy - L.y2top) / L.p2h);
    return { xf: Math.max(-XMAX, Math.min(XMAX, xp)), yf: Math.max(0, yf) };
  }

  function isInProbPlot(cx, cy) {
    const L = getLayout();
    return cx >= L.p2x && cx <= L.p2x + L.p2w &&
           cy >= L.y2top && cy <= L.y2top + L.p2h;
  }

  function onCanvasDown(evt) {
    if (!drawMode) return;
    const { cx, cy } = getCanvasCoords(evt);
    if (!isInProbPlot(cx, cy)) return;
    evt.preventDefault();
    drawActive = true;
    drawPoints = [];
    const { xf, yf } = canvasToProbCoords(cx, cy);
    drawPoints.push({ xf, yf });
  }

  function onCanvasMove(evt) {
    if (!drawMode || !drawActive) return;
    evt.preventDefault();
    const { cx, cy } = getCanvasCoords(evt);
    if (!isInProbPlot(cx, cy)) {
      drawActive = false;
      applyDrawnPDF();
      exitDrawMode();
      return;
    }
    const { xf, yf } = canvasToProbCoords(cx, cy);
    drawPoints.push({ xf, yf });
  }

  function onCanvasUp() {
    if (!drawMode || !drawActive) return;
    drawActive = false;
    applyDrawnPDF();
    exitDrawMode();
  }

  /* ── Smooth draw stroke → fVals grid over [−XMAX, XMAX] ── */
  function smoothDrawPoints() {
    if (drawPoints.length < 2) return null;

    const BINS = NQ + 1;
    const yBin = new Float64Array(BINS);
    const cnt  = new Float64Array(BINS);

    for (const p of drawPoints) {
      const k = Math.round((p.xf + XMAX) / (2 * XMAX) * NQ);
      if (k < 0 || k > NQ) continue;
      yBin[k] += p.yf;
      cnt[k]  += 1;
    }
    for (let k = 0; k <= NQ; k++) {
      if (cnt[k] > 0) yBin[k] /= cnt[k];
    }

    // Fill gaps by linear interpolation
    let lastHit = -1;
    for (let k = 0; k <= NQ; k++) {
      if (cnt[k] > 0) {
        if (lastHit >= 0 && k - lastHit > 1) {
          for (let j = lastHit + 1; j < k; j++) {
            const t = (j - lastHit) / (k - lastHit);
            yBin[j] = yBin[lastHit] * (1 - t) + yBin[k] * t;
          }
        }
        lastHit = k;
      }
    }

    // Gaussian smooth
    const sigma   = 0.025;
    const result  = new Float64Array(BINS);
    const sigBins = sigma * NQ;
    const radius  = Math.ceil(3 * sigBins);
    for (let k = 0; k <= NQ; k++) {
      let num = 0, den = 0;
      for (let j = Math.max(0, k - radius); j <= Math.min(NQ, k + radius); j++) {
        const dx = k - j;
        const ww = Math.exp(-(dx * dx) / (2 * sigBins * sigBins));
        num += ww * yBin[j];
        den += ww;
      }
      result[k] = den > 1e-9 ? num / den : 0;
    }
    return result;
  }

  function applyDrawnPDF() {
    const density = smoothDrawPoints();
    if (!density) return;
    const fVals = new Float64Array(NQ + 1);
    for (let k = 0; k <= NQ; k++) fVals[k] = Math.sqrt(Math.max(0, density[k]));
    projectFunction(fVals);
  }

  /* ── Layout ── */
  function getLayout() {
    const mL    = 0;
    const mR    = 0;
    const mTop  = Math.round(S * 0.04);
    const mMid  = Math.round(S * 0.06);
    const plotW = S;
    // Wavefunction panel height; prob panel fills remaining space to canvas bottom
    const plotH = Math.floor((S - mTop - mMid) / 2);
    const y1top = mTop;
    const y2top = mTop + plotH + mMid;
    const p2x   = 0;
    const p2w   = S;
    const p2h   = S - y2top;
    return { mL, mR, mTop, mMid, plotW, plotH, y1top, y2top, p2x, p2w, p2h };
  }

  /* ── Rendering ── */
  const NX = 150;

  function render() {
    if (!canvas) return;
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, S, S);

    const L = getLayout();
    drawParabola(L);

    if (drawMode) {
      drawDrawModeOverlay(L);
    } else {
      drawWavefunctionPlot(L.mL, L.y1top, L.plotW, L.plotH);
      drawProbabilityPlot (L.p2x, L.y2top, L.p2w, L.p2h);
    }
  }

  /* ── Parabolic well  V(x) = x²/2  drawn on the prob-density panel ── */
  function drawParabola(L) {
    const x0 = L.p2x, y0 = L.y2top, w = L.p2w, h = L.p2h;
    const wallW = Math.max(1, Math.round(S * 0.008));
    const step  = Math.round(S * 0.04);
    const NP    = 200;
    const yBottom = y0 + h;
    const yRange    = PDF_YMAX - PDF_YMIN;
    const wellYMin  = PDF_YMIN * 2;    // lower limit × 2
    const wellYMax  = PDF_YMAX * 2.5;  // upper limit × 1.5
    const wellRange = wellYMax - wellYMin;

    function toCanvasX(xp) { return x0 + (xp + XMAX) / (2 * XMAX) * w; }
    // toCanvasY uses scaled y range for the well
    function toCanvasY(v)  { return y0 + h * (1 - (v - wellYMin) / wellRange); }

    // V(x) = x²/2
    function potential(xp) { return xp * xp / 2; }

    // Build parabola path — arms allowed to extend above y2top
    const parabolaPath = [];
    for (let k = 0; k <= NP; k++) {
      const xp = -XMAX + 2 * XMAX * k / NP;
      parabolaPath.push({ px: toCanvasX(xp), py: toCanvasY(potential(xp)) });
    }

    // Hatch below the parabola, clipped to canvas bottom but not to panel top
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(parabolaPath[0].px, parabolaPath[0].py);
    for (let k = 1; k <= NP; k++) ctx.lineTo(parabolaPath[k].px, parabolaPath[k].py);
    ctx.lineTo(x0 + w, yBottom);
    ctx.lineTo(x0,     yBottom);
    ctx.closePath();
    ctx.clip();

    // Hatch lines tall enough to cover the full canvas height
    ctx.strokeStyle = _rgba('--text-dim', 0.30);
    ctx.lineWidth   = wallW;
    for (let d = -S; d <= w + S; d += step) {
      ctx.beginPath();
      ctx.moveTo(x0 + d,      0);
      ctx.lineTo(x0 + d - S,  S);
      ctx.stroke();
    }
    ctx.restore();

    // Parabola outline
    ctx.save();
    ctx.strokeStyle = _rgba('--text-dim', 0.35);
    ctx.lineWidth   = wallW;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(parabolaPath[0].px, parabolaPath[0].py);
    for (let k = 1; k <= NP; k++) ctx.lineTo(parabolaPath[k].px, parabolaPath[k].py);
    ctx.stroke();
    ctx.restore();
  }

  /* ── Draw-mode overlay ── */
  function drawDrawModeOverlay(L) {
    const x0 = L.p2x, y0 = L.y2top, w = L.p2w, h = L.p2h;

    ctx.save();
    ctx.fillStyle = _rgba('--pink-dark', 0.07);
    ctx.fillRect(x0, y0, w, h);
    ctx.restore();

    if (drawPoints.length > 1) {
      function toY(v) { return y0 + h * (1 - v / PDF_YMAX); }
      function toX(xp) { return x0 + (xp + XMAX) / (2 * XMAX) * w; }
      ctx.save();
      ctx.strokeStyle = PINK_LIGHT;
      ctx.lineWidth   = 2;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      drawPoints.forEach((p, i) => {
        const px = toX(p.xf), py = toY(p.yf);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      });
      ctx.stroke();
      ctx.restore();
    }

    const fs = Math.max(10, Math.round(S * 0.028));
    ctx.save();
    ctx.font = `italic ${fs}px 'EB Garamond', Georgia, serif`;
    ctx.fillStyle = _rgba('--pink-light', 0.55);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Draw a probability density', x0 + w / 2, y0 + h / 2);
    ctx.restore();
  }

  /* ── Dashed zero-axis ── */
  function drawXAxis(x0, y0, w, h) {
    const zy = y0 + h * 0.5;
    ctx.save();
    ctx.setLineDash([4, 5]);
    ctx.strokeStyle = _rgba('--text-dim', 0.38);
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo(x0, zy); ctx.lineTo(x0 + w, zy);
    ctx.stroke();
    ctx.restore();
  }

  /* ── Glow stroke helper ── */
  function strokeGlow(buildPath, glowColor, glowColorDim, mainColor) {
    ctx.save();
    ctx.shadowColor  = glowColor;
    ctx.shadowBlur   = 10;
    ctx.strokeStyle  = glowColorDim;
    ctx.lineWidth    = 2.5;
    ctx.globalAlpha  = 0.5;
    buildPath();
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.shadowColor  = glowColor;
    ctx.shadowBlur   = 18;
    ctx.strokeStyle  = mainColor;
    ctx.lineWidth    = 1.8;
    buildPath();
    ctx.stroke();
    ctx.restore();
  }

  /* ── Wavefunction plot: Re(ψ) teal, Im(ψ) pink ── */
  function drawWavefunctionPlot(x0, y0, w, h) {
    drawXAxis(x0, y0, w, h);

    const t = simTime;
    function toY(v)  { return y0 + h * (1 - (v + PSI_YMAX) / (2 * PSI_YMAX)); }
    function toX(xp) { return x0 + (xp + XMAX) / (2 * XMAX) * w; }

    const reArr = new Float32Array(NX + 1);
    const imArr = new Float32Array(NX + 1);
    for (let k = 0; k <= NX; k++) {
      const xp = -XMAX + 2 * XMAX * k / NX;
      const { re, im } = evalPsi(xp, t);
      reArr[k] = re; imArr[k] = im;
    }

    strokeGlow(
      () => { ctx.beginPath(); for (let k = 0; k <= NX; k++) { const px = toX(-XMAX + 2*XMAX*k/NX), py = toY(imArr[k]); if(k===0) ctx.moveTo(px,py); else ctx.lineTo(px,py); } },
      PINK_LIGHT, PINK_DARK, PINK_LIGHT
    );
    strokeGlow(
      () => { ctx.beginPath(); for (let k = 0; k <= NX; k++) { const px = toX(-XMAX + 2*XMAX*k/NX), py = toY(reArr[k]); if(k===0) ctx.moveTo(px,py); else ctx.lineTo(px,py); } },
      TEAL_LIGHT, TEAL_DARK, TEAL_LIGHT
    );
  }

  /* ── Probability density plot: |ψ|² with cyan fill ── */
  function drawProbabilityPlot(x0, y0, w, h) {
    const t = simTime;
    function toY(v)  { return y0 + h * (1 - (v - PDF_YMIN) / (PDF_YMAX - PDF_YMIN)); }
    function toX(xp) { return x0 + (xp + XMAX) / (2 * XMAX) * w; }

    const prob = new Float32Array(NX + 1);
    for (let k = 0; k <= NX; k++) {
      const xp = -XMAX + 2 * XMAX * k / NX;
      const { re, im } = evalPsi(xp, t);
      prob[k] = re * re + im * im;
    }

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(toX(-XMAX), y0 + h);
    for (let k = 0; k <= NX; k++) ctx.lineTo(toX(-XMAX + 2*XMAX*k/NX), toY(prob[k]));
    ctx.lineTo(toX(XMAX), y0 + h);
    ctx.closePath();
    const grad = ctx.createLinearGradient(x0, y0, x0, y0 + h);
    grad.addColorStop(0,   _rgba('--cyan', 0.45));
    grad.addColorStop(0.6, _rgba('--cyan', 0.15));
    grad.addColorStop(1,   _rgba('--cyan', 0.03));
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    strokeGlow(
      () => { ctx.beginPath(); for (let k = 0; k <= NX; k++) ctx.lineTo(toX(-XMAX + 2*XMAX*k/NX), toY(prob[k])); },
      CYAN, TEAL_DARK, CYAN
    );
  }

  /* ── Animation loop ── */
  const DT = 1 / 20;

  function loop() {
    if (running) {
      simTime += DT * simSpeed;
      updateGaugeArrows(simTime);
    }
    render();
    frameId = requestAnimationFrame(loop);
  }

  /* ── Gauge arrows ── */
  function gaugeAngle(i, t) { return phase[i] - energy(i) * t; }

  function updateGaugeArrows(t) {
    for (let i = 0; i < N_STATES; i++) {
      const arrow = document.getElementById('qho-gauge-arrow-' + i);
      if (!arrow) continue;
      const cx = 18, cy = 18, r = 12;
      if (amp[i] < 1e-9) {
        arrow.setAttribute('x2', (cx + r).toFixed(2));
        arrow.setAttribute('y2', cy.toFixed(2));
        continue;
      }
      const a = gaugeAngle(i, t);
      arrow.setAttribute('x2', (cx + r * Math.cos(a)).toFixed(2));
      arrow.setAttribute('y2', (cy - r * Math.sin(a)).toFixed(2));
    }
  }

  /* ── Gauge drag ── */
  function gaugePointerDown(evt, i) {
    if (drawMode) return;
    evt.preventDefault();
    gaugeDragging = i;
    const svg  = document.getElementById('qho-gauge-svg-' + i);
    const rect = svg.getBoundingClientRect();
    const cx   = rect.left + rect.width  / 2;
    const cy   = rect.top  + rect.height / 2;
    const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
    const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
    gaugeDragStartAngle = Math.atan2(-(clientY - cy), clientX - cx);
    gaugeDragStartPhase = phase[i] + energy(i) * simTime;
  }

  function gaugePointerMove(evt) {
    if (gaugeDragging < 0) return;
    evt.preventDefault();
    const i    = gaugeDragging;
    const svg  = document.getElementById('qho-gauge-svg-' + i);
    const rect = svg.getBoundingClientRect();
    const cx   = rect.left + rect.width  / 2;
    const cy   = rect.top  + rect.height / 2;
    const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
    const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
    const curAngle = Math.atan2(-(clientY - cy), clientX - cx);
    const delta    = curAngle - gaugeDragStartAngle;
    phase[i] = (gaugeDragStartPhase + delta) - energy(i) * simTime;
    updateGaugeArrows(simTime);
    if (!running) render();
  }

  function gaugePointerUp() { gaugeDragging = -1; }

  /* ── Build gauge SVG ── */
  function gaugeColor(i) {
    const t = i / Math.max(N_STATES - 1, 1);
    const r = Math.round(_TLR + (_PLR - _TLR) * t);
    const g = Math.round(_TLG + (_PLG - _TLG) * t);
    const b = Math.round(_TLB + (_PLB - _TLB) * t);
    return `rgb(${r},${g},${b})`;
  }

  function makeGaugeHTML(i) {
    const col = gaugeColor(i);
    return `
      <svg id="qho-gauge-svg-${i}" class="qho-gauge-svg" viewBox="0 0 36 36">
        <circle cx="18" cy="18" r="14" fill="none" stroke="${col}" stroke-width="1.5" opacity="0.45"/>
        <line x1="18" y1="4"  x2="18" y2="7"  stroke="${col}" stroke-width="1" opacity="0.4"/>
        <line x1="18" y1="29" x2="18" y2="32" stroke="${col}" stroke-width="1" opacity="0.4"/>
        <line x1="4"  y1="18" x2="7"  y2="18" stroke="${col}" stroke-width="1" opacity="0.4"/>
        <line x1="29" y1="18" x2="32" y2="18" stroke="${col}" stroke-width="1" opacity="0.4"/>
        <line id="qho-gauge-arrow-${i}" x1="18" y1="18" x2="30" y2="18"
              stroke="${col}" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
        <circle cx="18" cy="18" r="2" fill="${col}" opacity="0.8"/>
      </svg>`;
  }

  /* ── Build eigenstate rows ── */
  function buildEigenRows() {
    const subs = ['₀','₁','₂','₃','₄','₅','₆','₇','₈','₉'];
    let html = '';
    for (let i = 0; i < N_STATES; i++) {
      const def = (i === 0) ? '1.0' : '0.0';
      const col = gaugeColor(i);
      const label = i <= 9
        ? `c${subs[i]}`
        : `c<sub style="font-size:0.7em">${i}</sub>`;
      html += `
        <div class="qho-eigen-row">
          <span class="qho-eigen-label" style="color:${col};">${label}</span>
          <input type="range" id="qho-amp-${i}" min="0" max="1" step="0.01" value="${def}" style="accent-color:${col};">
          <div class="qho-gauge-wrap" id="qho-gauge-wrap-${i}">
            ${makeGaugeHTML(i)}
          </div>
        </div>`;
    }
    return html;
  }

  /* ── Shell ── */
  const shell = new AppletShell({
    id:    'qho',
    title: 'Quantum Harmonic Oscillator &mdash; 1D',
    gap:   0,

    ctrlHTML: `
      <div class="applet-shell-ctrl-section" style="flex-shrink:0;">
        <div class="applet-shell-ctrl-title">Actions</div>
        <div class="applet-shell-btn-row">
          <button class="applet-shell-btn" onclick="qhoReset()">Reset</button>
          <button class="applet-shell-btn active" id="qho-pause-btn" onclick="qhoTogglePause()">Resume</button>
        </div>
        <div class="applet-shell-slider-row">
          <span class="applet-shell-side">Slow</span>
          <input type="range" id="qho-speed" min="0.002" max="1.0" step="0.002" value="0.05">
          <span class="applet-shell-side">Fast</span>
        </div>
      </div>

      <div class="applet-shell-ctrl-section" style="flex-shrink:0;">
        <div class="applet-shell-ctrl-title">Presets</div>
        <div class="applet-shell-btn-row">
          <button class="applet-shell-btn" onclick="qhoPresetCoherent()">Coherent</button>
          <button class="applet-shell-btn" onclick="qhoPresetSqueezed()">Squeezed</button>
        </div>
        <div class="applet-shell-btn-row">
          <button class="applet-shell-btn" id="qho-draw-btn" onclick="qhoToggleDrawMode()">Draw PDF</button>
        </div>
      </div>

      <div class="applet-shell-ctrl-section" style="flex-shrink:0; padding: 4px 10px 2px;">
        <div class="applet-shell-ctrl-title">Eigenstates &nbsp;<span style="font-weight:normal;font-size:0.78em;color:var(--text-dim);">(amplitude | phase)</span></div>
      </div>

      <div id="qho-scrollable">
        ${buildEigenRows()}
      </div>
    `,

    onOpen: function ({ canvas: c, S: s }) {
      canvas = c;
      ctx    = canvas.getContext('2d');
      S      = s;

      init();

      for (let i = 0; i < N_STATES; i++) {
        const wrap = document.getElementById('qho-gauge-wrap-' + i);
        if (wrap) {
          wrap.addEventListener('mousedown',  (e) => gaugePointerDown(e, i));
          wrap.addEventListener('touchstart', (e) => gaugePointerDown(e, i), { passive: false });
        }
      }
      document.addEventListener('mousemove',  gaugePointerMove);
      document.addEventListener('mouseup',    gaugePointerUp);
      document.addEventListener('touchmove',  gaugePointerMove, { passive: false });
      document.addEventListener('touchend',   gaugePointerUp);

      canvas.addEventListener('mousedown',  onCanvasDown);
      canvas.addEventListener('mousemove',  onCanvasMove);
      canvas.addEventListener('mouseup',    onCanvasUp);
      canvas.addEventListener('touchstart', onCanvasDown, { passive: false });
      canvas.addEventListener('touchmove',  onCanvasMove, { passive: false });
      canvas.addEventListener('touchend',   onCanvasUp);

      for (let i = 0; i < N_STATES; i++) {
        (function(idx) {
          const sl = document.getElementById('qho-amp-' + idx);
          if (sl) sl.addEventListener('input', function () {
            amp[idx] = parseFloat(this.value);
            if (!running) render();
          });
        })(i);
      }

      const speedSl = document.getElementById('qho-speed');
      if (speedSl) {
        speedSl.value = simSpeed;
        speedSl.addEventListener('input', function () { simSpeed = parseFloat(this.value); });
      }

      running = false;
      const pb = document.getElementById('qho-pause-btn');
      if (pb) { pb.textContent = 'Resume'; pb.classList.add('active'); }

      if (!frameId) frameId = requestAnimationFrame(loop);
    },

    onClose: function () {
      running = false;
      exitDrawMode();
      if (frameId) { cancelAnimationFrame(frameId); frameId = null; }
      document.removeEventListener('mousemove',  gaugePointerMove);
      document.removeEventListener('mouseup',    gaugePointerUp);
      document.removeEventListener('touchmove',  gaugePointerMove);
      document.removeEventListener('touchend',   gaugePointerUp);
      const pb = document.getElementById('qho-pause-btn');
      if (pb) { pb.textContent = 'Resume'; pb.classList.add('active'); }
    },

    onResize: function ({ canvas: c, S: s }) {
      canvas = c;
      ctx    = canvas.getContext('2d');
      S      = s;
    },
  });

  /* ── Global entry points ── */
  window.qhoOpen  = () => shell.open();
  window.qhoClose = () => shell.close();

  window.qhoReset = function () {
    simTime = 0;
    exitDrawMode();
    init();
    render();
  };

  window.qhoTogglePause = function () {
    running = !running;
    const pb = document.getElementById('qho-pause-btn');
    if (pb) {
      pb.textContent = running ? 'Pause' : 'Resume';
      pb.classList.toggle('active', !running);
    }
  };

  window.qhoPresetCoherent  = presetCoherent;
  window.qhoPresetSqueezed  = presetSqueezed;
  window.qhoToggleDrawMode  = toggleDrawMode;

})();
</script>
