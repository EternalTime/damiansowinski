<!-- Forager Applet Include -->

<style>
/* ── Forager-specific ctrl panel layout ── */
#fa-sliders-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
#fa-sliders-scroll::-webkit-scrollbar { width: 0; }

#fa-phase-section {
  flex-shrink: 0;
  height: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-top: 1px solid var(--border-dark);
  overflow: hidden;
}
#fa-phase-title {
  font-size: 14px; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text-dim);
  padding: 6px 16px 4px;
  align-self: flex-start;
  flex-shrink: 0;
}
#fa-phase-canvas {
  display: block;
  background: var(--bg-panel);
  flex: 1;
  min-height: 0;
}

#fa-extinction-stamp {
  display: none;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(-15deg);
  color: var(--red);
  font-size: 48px;
  font-weight: bold;
  letter-spacing: 6px;
  border: 6px solid var(--red);
  padding: 10px 24px;
  opacity: 0.92;
  pointer-events: none;
  white-space: nowrap;
  font-family: 'EB Garamond', Georgia, serif;
}
</style>

<script>
(function () {
'use strict';

const _cs = getComputedStyle(document.documentElement);
const _c   = n => _cs.getPropertyValue(n).trim();
const _rgb  = n => { const h = _c(n).replace('#',''); const v = parseInt(h,16); return [(v>>16)&0xFF,(v>>8)&0xFF,v&0xFF]; };
const _rgba = (n, a) => { const [r,g,b] = _rgb(n); return `rgba(${r},${g},${b},${a})`; };

const [_GLR, _GLG, _GLB] = _rgb('--green-light');

const NX = 10, NY = 10, L = 10;
const DOMAIN      = NX * L;
const GAMMA       = 1e-3;
const MU0         = 0.1;
const S_MAX       = 1.0;
const S_REP       = 0.8;
const R_COL       = 1.0;
const DT          = 0.02;
const GAMMA_DECAY = 0.1;
const TAU_E       = 1.0 / GAMMA_DECAY;
const RHO_EQ      = GAMMA * TAU_E;
const N_A_MAX     = (GAMMA / MU0) * DOMAIN * DOMAIN;

let R_sense = 6.0, vel = 20.0, sigma = 0.1, Xi = 0.5;
let epsilon = epsilonFromXi(Xi);
let stepsPerFrame = 1;

function epsilonFromXi(xi) {
  const n_eq = (xi / R_COL) * (xi / R_COL);
  return GAMMA / (n_eq * GAMMA_DECAY);
}
function nEqResources() { return (Xi / R_COL) * (Xi / R_COL) * DOMAIN * DOMAIN; }
function nRMax() { return nEqResources(); }

let resources = [], agents = [], simTime = 0;
let phaseTrail = [];
let running = false, frameId = null, initialized = false, extinct = false;

function initResources() {
  resources = [];
  const n = Math.round(nEqResources());
  for (let i = 0; i < n; i++)
    resources.push({ x: Math.random() * DOMAIN, y: Math.random() * DOMAIN });
}

function updateResources() {
  const birthMean = GAMMA * DOMAIN * DOMAIN * DT / epsilon;
  const nBirth = poissonSample(birthMean);
  for (let i = 0; i < nBirth; i++)
    resources.push({ x: Math.random() * DOMAIN, y: Math.random() * DOMAIN });
  const pDecay = 1 - Math.exp(-GAMMA_DECAY * DT);
  for (let i = resources.length - 1; i >= 0; i--)
    if (Math.random() < pDecay) { resources[i] = resources[resources.length - 1]; resources.pop(); }
}

function makeAgent(x, y, theta, s) {
  return {
    x:     x     !== undefined ? x     : Math.random() * DOMAIN,
    y:     y     !== undefined ? y     : Math.random() * DOMAIN,
    theta: theta !== undefined ? theta : Math.random() * 2 * Math.PI,
    s:     s     !== undefined ? s     : S_MAX * (0.3 + Math.random() * 0.5),
  };
}

function randn() {
  return Math.sqrt(-2 * Math.log(Math.random() || 1e-20)) * Math.cos(2 * Math.PI * Math.random());
}

function wrap(v) { return ((v % DOMAIN) + DOMAIN) % DOMAIN; }

function toroidalDisp(ax, ay, bx, by) {
  let dx = bx - ax, dy = by - ay;
  if (dx >  DOMAIN / 2) dx -= DOMAIN;
  if (dx < -DOMAIN / 2) dx += DOMAIN;
  if (dy >  DOMAIN / 2) dy -= DOMAIN;
  if (dy < -DOMAIN / 2) dy += DOMAIN;
  return [dx, dy];
}

function agentStep(a) {
  let best2 = R_sense * R_sense, bestIdx = -1;
  for (let i = 0; i < resources.length; i++) {
    const [dx, dy] = toroidalDisp(a.x, a.y, resources[i].x, resources[i].y);
    const d2 = dx * dx + dy * dy;
    if (d2 < best2) { best2 = d2; bestIdx = i; }
  }
  if (bestIdx >= 0) {
    const [dx, dy] = toroidalDisp(a.x, a.y, resources[bestIdx].x, resources[bestIdx].y);
    a.theta = Math.atan2(dy, dx);
  } else {
    a.theta += sigma * randn() * Math.sqrt(DT);
  }
  a.x = wrap(a.x + vel * Math.cos(a.theta) * DT);
  a.y = wrap(a.y + vel * Math.sin(a.theta) * DT);
  let harvested = 0;
  for (let i = resources.length - 1; i >= 0; i--) {
    const [dx, dy] = toroidalDisp(a.x, a.y, resources[i].x, resources[i].y);
    if (dx * dx + dy * dy <= R_COL * R_COL) {
      resources[i] = resources[resources.length - 1]; resources.pop(); harvested++;
    }
  }
  a.s = Math.min(S_MAX, a.s - MU0 * DT + harvested * epsilon);
}

function simStep() {
  updateResources();
  const newborns = [];
  for (let i = agents.length - 1; i >= 0; i--) {
    const a = agents[i];
    agentStep(a);
    if (a.s >= S_REP) {
      const ang = Math.random() * 2 * Math.PI;
      a.s /= 2;
      newborns.push(makeAgent(wrap(a.x + Math.cos(ang) * R_COL),
                              wrap(a.y + Math.sin(ang) * R_COL),
                              Math.random() * 2 * Math.PI, a.s));
    }
    if (a.s <= 0) agents.splice(i, 1);
  }
  agents.push(...newborns);
  simTime++;
  phaseTrail.push({ nr: resources.length / nRMax(), na: agents.length / N_A_MAX });
  if (phaseTrail.length > PHASE_LEN) phaseTrail.shift();

  if (agents.length === 0 && !extinct) {
    extinct = true; running = false;
    document.getElementById('fa-btn-run').textContent = 'Run';
    document.getElementById('fa-btn-run').classList.remove('active');
    const stamp = document.getElementById('fa-extinction-stamp');
    if (stamp) stamp.style.display = 'block';
  }
}

function poissonSample(lam) {
  if (lam <= 0) return 0;
  if (lam > 30) return Math.max(0, Math.round(lam + Math.sqrt(lam) * randn()));
  const L = Math.exp(-lam); let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

function faInitSim() {
  simTime = 0; phaseTrail = []; extinct = false;
  const stamp = document.getElementById('fa-extinction-stamp');
  if (stamp) stamp.style.display = 'none';
  epsilon = epsilonFromXi(Xi);
  initResources();
  agents = Array.from({ length: Math.round(N_A_MAX) }, () => makeAgent());
  phaseTrail.push({ nr: 1, na: 1 });
}

let simCanvas, simCtx, phaseCanvas, phaseCtx;
let accumCanvas, accumCtx;

function drawSim() {
  const W = simCanvas.width, H = simCanvas.height;
  const scale = Math.min(W / DOMAIN, H / DOMAIN);
  const offX = (W - DOMAIN * scale) / 2, offY = (H - DOMAIN * scale) / 2;
  const tx = x => offX + x * scale, ty = y => offY + y * scale;
  simCtx.fillStyle = _c('--blue-mid');
  simCtx.fillRect(0, 0, W, H);
  for (const r of resources) {
    simCtx.beginPath(); simCtx.arc(tx(r.x), ty(r.y), 3.5, 0, 2 * Math.PI);
    simCtx.fillStyle = _c('--green-light'); simCtx.fill();
    simCtx.beginPath(); simCtx.arc(tx(r.x), ty(r.y), 1.8, 0, 2 * Math.PI);
    simCtx.fillStyle = _c('--green-dark'); simCtx.fill();
  }
  for (const a of agents) {
    const ax = tx(a.x), ay = ty(a.y);
    const hf = Math.max(0, a.s / S_MAX);
    const agR = scale * 1.2 * (0.35 + 0.65 * hf);
    simCtx.beginPath(); simCtx.arc(ax, ay, R_sense * scale, 0, 2 * Math.PI);
    simCtx.fillStyle = _rgba('--blue-light', 0.12); simCtx.fill();
    simCtx.beginPath(); simCtx.arc(ax, ay, agR, 0, 2 * Math.PI);
    simCtx.fillStyle = _c('--pink-light'); simCtx.fill();
    simCtx.strokeStyle = _c('--teal-dark'); simCtx.lineWidth = 2.5; simCtx.stroke();
    simCtx.beginPath();
    simCtx.moveTo(ax, ay);
    simCtx.lineTo(ax + Math.cos(a.theta) * agR * 1.5, ay + Math.sin(a.theta) * agR * 1.5);
    simCtx.strokeStyle = _c('--text-bright'); simCtx.lineWidth = 1.5; simCtx.stroke();
  }
}

const BLOB_A = 0.12, PHASE_LEN = 200;
const MARGIN = 0.15, MARGIN_INNER = 0.075;
const LOG_MIN = 0.01, LOG_MAX = 10.0;
const LOG_SPAN = Math.log10(LOG_MAX / LOG_MIN);

function logScale(v) {
  return (Math.log10(Math.max(LOG_MIN, Math.min(LOG_MAX, v))) - Math.log10(LOG_MIN)) / LOG_SPAN;
}
function phaseToPixel(nr, na, W, H) {
  const x0=W*MARGIN, x1=W*(1-MARGIN_INNER), y0=H*MARGIN_INNER, y1=H*(1-MARGIN);
  return [x0 + logScale(nr)*(x1-x0), y1 - logScale(na)*(y1-y0)];
}

function initAccum() {
  accumCanvas = document.createElement('canvas');
  accumCanvas.width  = phaseCanvas.width;
  accumCanvas.height = phaseCanvas.height;
  accumCtx = accumCanvas.getContext('2d');
}
function resizeAccum() {
  const tmp = document.createElement('canvas');
  tmp.width = phaseCanvas.width; tmp.height = phaseCanvas.height;
  const tCtx = tmp.getContext('2d');
  if (accumCanvas) tCtx.drawImage(accumCanvas, 0, 0, tmp.width, tmp.height);
  accumCanvas = tmp; accumCtx = tCtx;
}
function clearAccum() {
  if (accumCtx) accumCtx.clearRect(0, 0, accumCanvas.width, accumCanvas.height);
}

function addBlob(nr, na, alphaMul = 1) {
  const W=accumCanvas.width, H=accumCanvas.height;
  const [cx, cy] = phaseToPixel(nr, na, W, H);
  const r = W * 0.03, a = BLOB_A * alphaMul;
  const grad = accumCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
  grad.addColorStop(0,   `rgba(${_GLR},${_GLG},${_GLB},${a})`);
  grad.addColorStop(0.5, `rgba(${_GLR},${_GLG},${_GLB},${a * 0.4})`);
  grad.addColorStop(1,   `rgba(${_GLR},${_GLG},${_GLB},0)`);
  accumCtx.save();
  accumCtx.globalCompositeOperation = 'lighter';
  accumCtx.fillStyle = grad;
  accumCtx.beginPath(); accumCtx.arc(cx, cy, r, 0, 2 * Math.PI); accumCtx.fill();
  accumCtx.restore();
}

function drawPhase() {
  const W=phaseCanvas.width, H=phaseCanvas.height;
  if (W===0||H===0) return;
  const x0=W*MARGIN, x1=W*(1-MARGIN_INNER), y0=H*MARGIN_INNER, y1=H*(1-MARGIN);
  clearAccum();
  const decay = Math.log(200) / 100;
  for (let i = 0; i < phaseTrail.length; i++) {
    addBlob(phaseTrail[i].nr, phaseTrail[i].na, Math.exp(-decay*(phaseTrail.length-1-i)));
  }
  phaseCtx.fillStyle = _c('--bg-panel'); phaseCtx.fillRect(0, 0, W, H);
  phaseCtx.drawImage(accumCanvas, 0, 0);
  phaseCtx.save();
  phaseCtx.setLineDash([5, 4]);
  phaseCtx.strokeStyle = _rgba('--pink-light', 0.7);
  phaseCtx.lineWidth = 1;
  phaseCtx.beginPath();
  let started = false;
  for (let k = 0; k <= 200; k++) {
    const nr = LOG_MIN + (1 - 2*LOG_MIN)*k/200, na = 1 - nr;
    if (na < LOG_MIN || nr < LOG_MIN) continue;
    const [px, py] = phaseToPixel(nr, na, W, H);
    if (!started) { phaseCtx.moveTo(px, py); started = true; } else phaseCtx.lineTo(px, py);
  }
  phaseCtx.stroke(); phaseCtx.setLineDash([]); phaseCtx.restore();
  phaseCtx.save(); phaseCtx.lineWidth = 1;
  const gx = phaseCtx.createLinearGradient(x0,y1,x1,y1);
  gx.addColorStop(0,_rgba('--cyan',0.85)); gx.addColorStop(1,_rgba('--cyan',0));
  phaseCtx.strokeStyle = gx;
  phaseCtx.beginPath(); phaseCtx.moveTo(x0,y1); phaseCtx.lineTo(x1,y1); phaseCtx.stroke();
  const gy = phaseCtx.createLinearGradient(x0,y1,x0,y0);
  gy.addColorStop(0,_rgba('--cyan',0.85)); gy.addColorStop(1,_rgba('--cyan',0));
  phaseCtx.strokeStyle = gy;
  phaseCtx.beginPath(); phaseCtx.moveTo(x0,y1); phaseCtx.lineTo(x0,y0); phaseCtx.stroke();
  phaseCtx.restore();
  const fontSize = Math.round(W * 0.05);
  phaseCtx.save();
  phaseCtx.font = `${fontSize}px 'EB Garamond', Georgia, serif`;
  phaseCtx.textAlign='center'; phaseCtx.textBaseline='top'; phaseCtx.fillStyle=_c('--green-light');
  phaseCtx.fillText('Resources', (x0+x1)/2, y1+fontSize*0.3);
  phaseCtx.translate(x0-fontSize*0.3, (y0+y1)/2);
  phaseCtx.rotate(-Math.PI/2); phaseCtx.textAlign='center'; phaseCtx.textBaseline='bottom';
  phaseCtx.fillStyle=_c('--pink-light'); phaseCtx.fillText('Foragers', 0, 0);
  phaseCtx.restore();
}

function loop() {
  if (running) {
    for (let i = 0; i < stepsPerFrame; i++) simStep();
    drawSim(); drawPhase();
  }
  frameId = requestAnimationFrame(loop);
}

function resizePhaseCanvas(S, ctrlW) {
  if (!phaseCanvas) return;
  const title  = document.getElementById('fa-phase-title');
  const titleH = title ? (title.offsetHeight || 32) : 32;
  const side   = Math.min(ctrlW - 16, Math.round(S * 0.5) - titleH - 8);
  phaseCanvas.width  = side;
  phaseCanvas.height = side;
  if (accumCanvas) resizeAccum();
}

/* ── Shell wiring ── */
const shell = new AppletShell({
  id:    'fa',
  title: 'Forager &mdash; Active Energy Harvesting',
  gap:   0,

  ctrlHTML: `
    <div class="applet-shell-ctrl-section">
      <div class="applet-shell-ctrl-title">Simulation</div>
      <div class="applet-shell-btn-row">
        <button class="applet-shell-btn" id="fa-btn-run">Run</button>
        <button class="applet-shell-btn" id="fa-btn-reset">Reset</button>
      </div>
    </div>
    <div id="fa-sliders-scroll">
      <div class="applet-shell-ctrl-section">
        <div class="applet-shell-ctrl-title">Speed</div>
        <div class="applet-shell-slider-row">
          <span class="applet-shell-side">Slow</span>
          <input type="range" id="fa-sl-speed" min="1" max="20" step="1" value="5">
          <span class="applet-shell-side">Fast</span>
        </div>
      </div>
      <div class="applet-shell-ctrl-section">
        <div class="applet-shell-ctrl-title">Sense Radius</div>
        <div class="applet-shell-slider-row">
          <span class="applet-shell-side">Small</span>
          <input type="range" id="fa-sl-sense" min="1" max="20" step="0.5" value="6">
          <span class="applet-shell-side">Large</span>
        </div>
      </div>
      <div class="applet-shell-ctrl-section">
        <div class="applet-shell-ctrl-title">Velocity</div>
        <div class="applet-shell-slider-row">
          <span class="applet-shell-side">Slow</span>
          <input type="range" id="fa-sl-vel" min="1" max="40" step="1" value="20">
          <span class="applet-shell-side">Fast</span>
        </div>
      </div>
      <div class="applet-shell-ctrl-section">
        <div class="applet-shell-ctrl-title">Tumble</div>
        <div class="applet-shell-slider-row">
          <span class="applet-shell-side">Ballistic</span>
          <input type="range" id="fa-sl-sigma" min="0" max="2" step="0.05" value="0.1">
          <span class="applet-shell-side">Diffusive</span>
        </div>
      </div>
      <div class="applet-shell-ctrl-section">
        <div class="applet-shell-ctrl-title">Homogeneity</div>
        <div class="applet-shell-slider-row">
          <span class="applet-shell-side">Sparse</span>
          <input type="range" id="fa-sl-xi" min="0.05" max="2.0" step="0.05" value="0.5">
          <span class="applet-shell-side">Dense</span>
        </div>
      </div>
    </div>
    <div id="fa-phase-section">
      <div id="fa-phase-title">Phase Plane</div>
      <canvas id="fa-phase-canvas"></canvas>
    </div>
  `,

  onOpen: function ({ canvas: c, S }) {
    // Inject extinction stamp into sim panel
    const simPanel = document.getElementById('fa-sim-panel');
    if (!document.getElementById('fa-extinction-stamp')) {
      const stamp = document.createElement('div');
      stamp.id = 'fa-extinction-stamp';
      stamp.textContent = 'EXTINCTION';
      simPanel.appendChild(stamp);
    }

    simCanvas = c;
    simCtx    = simCanvas.getContext('2d');
    phaseCanvas = document.getElementById('fa-phase-canvas');
    phaseCtx    = phaseCanvas.getContext('2d');

    const ctrlW = Math.floor(S / 1.6180339887);
    resizePhaseCanvas(S, ctrlW);

    if (!initialized) { faInitSim(); initialized = true; }
    initAccum();

    running = true;
    document.getElementById('fa-btn-run').textContent = 'Pause';
    document.getElementById('fa-btn-run').classList.add('active');
    if (!frameId) frameId = requestAnimationFrame(loop);
  },

  onClose: function () {
    running = false;
    if (frameId) { cancelAnimationFrame(frameId); frameId = null; }
    const btn = document.getElementById('fa-btn-run');
    if (btn) { btn.textContent = 'Run'; btn.classList.remove('active'); }
  },

  onResize: function ({ canvas: c, S }) {
    simCanvas = c;
    const ctrlW = Math.floor(S / 1.6180339887);
    resizePhaseCanvas(S, ctrlW);
  },
});

window.faOpen  = () => shell.open();
window.faClose = () => shell.close();

document.getElementById('fa-btn-run').addEventListener('click', () => {
  running = !running;
  document.getElementById('fa-btn-run').textContent = running ? 'Pause' : 'Run';
  document.getElementById('fa-btn-run').classList.toggle('active', running);
  if (running && !frameId) frameId = requestAnimationFrame(loop);
});

document.getElementById('fa-btn-reset').addEventListener('click', () => {
  faInitSim(); clearAccum(); drawSim(); drawPhase();
});

document.getElementById('fa-sl-speed').addEventListener('input', function () {
  stepsPerFrame = parseInt(this.value);
});
document.getElementById('fa-sl-sense').addEventListener('input', function () {
  R_sense = parseFloat(this.value);
  if (!running && simCanvas) drawSim();
});
document.getElementById('fa-sl-vel').addEventListener('input', function () {
  vel = parseFloat(this.value);
});
document.getElementById('fa-sl-sigma').addEventListener('input', function () {
  sigma = parseFloat(this.value);
});
document.getElementById('fa-sl-xi').addEventListener('input', function () {
  Xi = parseFloat(this.value); epsilon = epsilonFromXi(Xi);
});

})();
</script>
