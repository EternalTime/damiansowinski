<script>
(function () {
'use strict';

const GAP = 0, PAD = 20, PHI = 1.6180339887;

// ── Fixed parameters ───────────────────────────────────────────────────────
const NX          = 10;
const NY          = 10;
const L           = 10;
const DOMAIN      = NX * L;         // 100
const GAMMA       = 1e-3;
const MU0         = 0.1;
const S_MAX       = 1.0;
const S_REP       = 0.8;
const R_COL       = 1.0;
const DT          = 0.02;
const GAMMA_DECAY = 0.1;
const TAU_E       = 1.0 / GAMMA_DECAY;
const RHO_EQ      = GAMMA * TAU_E;
const N_A_MAX     = (GAMMA / MU0) * DOMAIN * DOMAIN;

// ── Mutable parameters ─────────────────────────────────────────────────────
let R_sense = 6.0, vel = 20.0, sigma = 0.1, Xi = 0.5;
let epsilon = epsilonFromXi(Xi);
let stepsPerFrame = 1;

function epsilonFromXi(xi) {
  const n_eq = (xi / R_COL) * (xi / R_COL);
  return GAMMA / (n_eq * GAMMA_DECAY);
}

function nEqResources() {
  const n_eq = (Xi / R_COL) * (Xi / R_COL);
  return n_eq * DOMAIN * DOMAIN;
}

function nRMax() { return nEqResources(); }

// ── State ──────────────────────────────────────────────────────────────────
let resources = [], agents = [], simTime = 0;
let phaseTrail = [];
let running = false, frameId = null, initialized = false, extinct = false;

// ── Environment ────────────────────────────────────────────────────────────
function initResources() {
  resources = [];
  const n = Math.round(nEqResources());
  for (let i = 0; i < n; i++)
    resources.push({ x: Math.random() * DOMAIN, y: Math.random() * DOMAIN });
}

function updateResources() {
  const birthMean = GAMMA * DOMAIN * DOMAIN * DT / epsilon;
  const nBirth = poissonSample(birthMean);
  for (let i = 0; i < nBirth; i++)
    resources.push({ x: Math.random() * DOMAIN, y: Math.random() * DOMAIN });
  const pDecay = 1 - Math.exp(-GAMMA_DECAY * DT);
  for (let i = resources.length - 1; i >= 0; i--)
    if (Math.random() < pDecay) { resources[i] = resources[resources.length - 1]; resources.pop(); }
}

// ── Agents ─────────────────────────────────────────────────────────────────
function makeAgent(x, y, theta, s) {
  return {
    x:     x     !== undefined ? x     : Math.random() * DOMAIN,
    y:     y     !== undefined ? y     : Math.random() * DOMAIN,
    theta: theta !== undefined ? theta : Math.random() * 2 * Math.PI,
    s:     s     !== undefined ? s     : S_MAX * (0.3 + Math.random() * 0.5),
  };
}

function randn() {
  return Math.sqrt(-2 * Math.log(Math.random() || 1e-20)) * Math.cos(2 * Math.PI * Math.random());
}

function wrap(v) { return ((v % DOMAIN) + DOMAIN) % DOMAIN; }

function toroidalDisp(ax, ay, bx, by) {
  let dx = bx - ax, dy = by - ay;
  if (dx >  DOMAIN / 2) dx -= DOMAIN;
  if (dx < -DOMAIN / 2) dx += DOMAIN;
  if (dy >  DOMAIN / 2) dy -= DOMAIN;
  if (dy < -DOMAIN / 2) dy += DOMAIN;
  return [dx, dy];
}

function agentStep(a) {
  let best2 = R_sense * R_sense, bestIdx = -1;
  for (let i = 0; i < resources.length; i++) {
    const [dx, dy] = toroidalDisp(a.x, a.y, resources[i].x, resources[i].y);
    const d2 = dx * dx + dy * dy;
    if (d2 < best2) { best2 = d2; bestIdx = i; }
  }
  if (bestIdx >= 0) {
    const [dx, dy] = toroidalDisp(a.x, a.y, resources[bestIdx].x, resources[bestIdx].y);
    a.theta = Math.atan2(dy, dx);
  } else {
    a.theta += sigma * randn() * Math.sqrt(DT);
  }
  a.x = wrap(a.x + vel * Math.cos(a.theta) * DT);
  a.y = wrap(a.y + vel * Math.sin(a.theta) * DT);
  let harvested = 0;
  for (let i = resources.length - 1; i >= 0; i--) {
    const [dx, dy] = toroidalDisp(a.x, a.y, resources[i].x, resources[i].y);
    if (dx * dx + dy * dy <= R_COL * R_COL) {
      resources[i] = resources[resources.length - 1]; resources.pop(); harvested++;
    }
  }
  a.s = Math.min(S_MAX, a.s - MU0 * DT + harvested * epsilon);
}

function simStep() {
  updateResources();
  const newborns = [];
  for (let i = agents.length - 1; i >= 0; i--) {
    const a = agents[i];
    agentStep(a);
    if (a.s >= S_REP) {
      const ang = Math.random() * 2 * Math.PI;
      a.s /= 2;
      newborns.push(makeAgent(wrap(a.x + Math.cos(ang) * R_COL),
                              wrap(a.y + Math.sin(ang) * R_COL),
                              Math.random() * 2 * Math.PI, a.s));
    }
    if (a.s <= 0) agents.splice(i, 1);
  }
  agents.push(...newborns);
  simTime++;
  phaseTrail.push({ nr: resources.length / nRMax(), na: agents.length / N_A_MAX });
  if (phaseTrail.length > PHASE_LEN) phaseTrail.shift();

  if (agents.length === 0 && !extinct) {
    extinct = true; running = false;
    document.getElementById('fa-btn-run').textContent = 'Run';
    document.getElementById('fa-btn-run').classList.remove('active');
    document.getElementById('fa-extinction-stamp').style.display = 'block';
  }
}

function poissonSample(lam) {
  if (lam <= 0) return 0;
  if (lam > 30) return Math.max(0, Math.round(lam + Math.sqrt(lam) * randn()));
  const L = Math.exp(-lam); let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

function faInitSim() {
  simTime = 0; phaseTrail = []; extinct = false;
  document.getElementById('fa-extinction-stamp').style.display = 'none';
  epsilon = epsilonFromXi(Xi);
  initResources();
  const nA = Math.round(N_A_MAX);
  agents = Array.from({ length: nA }, () => makeAgent());
  phaseTrail.push({ nr: 1, na: 1 });
}

// ── Canvas handles ─────────────────────────────────────────────────────────
let simCanvas, simCtx, phaseCanvas, phaseCtx;
let accumCanvas, accumCtx;

// ── Draw sim ───────────────────────────────────────────────────────────────
function drawSim() {
  const W = simCanvas.width, H = simCanvas.height;
  const scale = Math.min(W / DOMAIN, H / DOMAIN);
  const offX = (W - DOMAIN * scale) / 2, offY = (H - DOMAIN * scale) / 2;
  const tx = x => offX + x * scale, ty = y => offY + y * scale;

  simCtx.fillStyle = '#5a7a96';
  simCtx.fillRect(0, 0, W, H);

  for (const r of resources) {
    simCtx.beginPath(); simCtx.arc(tx(r.x), ty(r.y), 3.5, 0, 2 * Math.PI);
    simCtx.fillStyle = '#4db84a'; simCtx.fill();
    simCtx.beginPath(); simCtx.arc(tx(r.x), ty(r.y), 1.8, 0, 2 * Math.PI);
    simCtx.fillStyle = '#2a6e2a'; simCtx.fill();
  }

  for (const a of agents) {
    const ax = tx(a.x), ay = ty(a.y);
    const hf = Math.max(0, a.s / S_MAX);
    const agR = scale * 1.2 * (0.35 + 0.65 * hf);

    simCtx.beginPath(); simCtx.arc(ax, ay, R_sense * scale, 0, 2 * Math.PI);
    simCtx.fillStyle = 'rgba(106,184,216,0.12)'; simCtx.fill();

    simCtx.beginPath(); simCtx.arc(ax, ay, agR, 0, 2 * Math.PI);
    simCtx.fillStyle = '#ff6da2'; simCtx.fill();
    simCtx.strokeStyle = '#23bbad'; simCtx.lineWidth = 2.5; simCtx.stroke();

    simCtx.beginPath();
    simCtx.moveTo(ax, ay);
    simCtx.lineTo(ax + Math.cos(a.theta) * agR * 1.5, ay + Math.sin(a.theta) * agR * 1.5);
    simCtx.strokeStyle = '#eef2f5'; simCtx.lineWidth = 1.5; simCtx.stroke();
  }
}

// ── Phase plane blob density ───────────────────────────────────────────────
const BLOB_A    = 0.12;
const PHASE_LEN = 200;

function initAccum() {
  accumCanvas = document.createElement('canvas');
  accumCanvas.width  = phaseCanvas.width;
  accumCanvas.height = phaseCanvas.height;
  accumCtx = accumCanvas.getContext('2d');
}

function resizeAccum() {
  const tmp = document.createElement('canvas');
  tmp.width  = phaseCanvas.width;
  tmp.height = phaseCanvas.height;
  const tCtx = tmp.getContext('2d');
  if (accumCanvas) tCtx.drawImage(accumCanvas, 0, 0, tmp.width, tmp.height);
  accumCanvas = tmp;
  accumCtx    = tCtx;
}

function clearAccum() {
  if (accumCtx) accumCtx.clearRect(0, 0, accumCanvas.width, accumCanvas.height);
}

// Phase plane margins (fraction of canvas size)
const MARGIN        = 0.15;   // left and bottom
const MARGIN_INNER  = 0.075;  // right and top (half)
const LOG_MIN  = 0.01;   // axis lower bound (normalised units)
const LOG_MAX  = 10.0;   // axis upper bound (normalised units)
const LOG_SPAN = Math.log10(LOG_MAX / LOG_MIN);  // 4 decades

function logScale(v) {
  // Map v ∈ [LOG_MIN, LOG_MAX] → [0, 1] on a log₁₀ axis
  const clamped = Math.max(LOG_MIN, Math.min(LOG_MAX, v));
  return (Math.log10(clamped) - Math.log10(LOG_MIN)) / LOG_SPAN;
}

// Map normalised (nr, na) → pixel coords within the plot area (log scale)
function phaseToPixel(nr, na, W, H) {
  const x0 = W * MARGIN,       x1 = W * (1 - MARGIN_INNER);
  const y0 = H * MARGIN_INNER, y1 = H * (1 - MARGIN);
  return [ x0 + logScale(nr) * (x1 - x0), y1 - logScale(na) * (y1 - y0) ];
}

function addBlob(nr, na, alphaMul = 1) {
  const W = accumCanvas.width, H = accumCanvas.height;
  const [cx, cy] = phaseToPixel(nr, na, W, H);
  const r  = W * 0.03;
  const a  = BLOB_A * alphaMul;
  const grad = accumCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
  grad.addColorStop(0,   `rgba(77,184,74,${a})`);
  grad.addColorStop(0.5, `rgba(77,184,74,${a * 0.4})`);
  grad.addColorStop(1,   'rgba(77,184,74,0)');
  accumCtx.save();
  accumCtx.globalCompositeOperation = 'lighter';
  accumCtx.fillStyle = grad;
  accumCtx.beginPath();
  accumCtx.arc(cx, cy, r, 0, 2 * Math.PI);
  accumCtx.fill();
  accumCtx.restore();
}

function drawPhase() {
  const W = phaseCanvas.width, H = phaseCanvas.height;
  if (W === 0 || H === 0) return;

  // Plot area bounds in pixels
  const x0 = W * MARGIN,       x1 = W * (1 - MARGIN_INNER);
  const y0 = H * MARGIN_INNER, y1 = H * (1 - MARGIN);

  // Repaint blobs
  clearAccum();
  const decay = Math.log(200) / 100;  // e-folding over ~100 most-recent points
  for (let i = 0; i < phaseTrail.length; i++) {
    const age = phaseTrail.length - 1 - i;  // 0 = newest
    const alphaMul = Math.exp(-decay * age);
    addBlob(phaseTrail[i].nr, phaseTrail[i].na, alphaMul);
  }

  // Background
  phaseCtx.fillStyle = '#1a2530';
  phaseCtx.fillRect(0, 0, W, H);

  // Blob density layer
  phaseCtx.drawImage(accumCanvas, 0, 0);

  // Equilibrium curve: nr + na = 1, traced on the log-log plot
  {
    phaseCtx.save();
    phaseCtx.setLineDash([5, 4]);
    phaseCtx.strokeStyle = 'rgba(255,109,162,0.7)';
    phaseCtx.lineWidth = 1;
    phaseCtx.beginPath();
    const nSteps = 200;
    let started = false;
    for (let k = 0; k <= nSteps; k++) {
      const nr = LOG_MIN + (1 - 2 * LOG_MIN) * k / nSteps;
      const na = 1 - nr;
      if (na < LOG_MIN || nr < LOG_MIN) continue;
      const [px, py] = phaseToPixel(nr, na, W, H);
      if (!started) { phaseCtx.moveTo(px, py); started = true; }
      else phaseCtx.lineTo(px, py);
    }
    phaseCtx.stroke();
    phaseCtx.setLineDash([]);
    phaseCtx.restore();
  }

  // Axes — L-shape, each fading from opaque at origin to transparent at far end
  phaseCtx.save();
  phaseCtx.lineWidth = 1;

  // x-axis: origin (x0,y1) → far right (x1,y1)
  const gx = phaseCtx.createLinearGradient(x0, y1, x1, y1);
  gx.addColorStop(0, 'rgba(42,190,217,0.85)');
  gx.addColorStop(1, 'rgba(42,190,217,0)');
  phaseCtx.strokeStyle = gx;
  phaseCtx.beginPath();
  phaseCtx.moveTo(x0, y1); phaseCtx.lineTo(x1, y1);
  phaseCtx.stroke();

  // y-axis: origin (x0,y1) → far top (x0,y0)
  const gy = phaseCtx.createLinearGradient(x0, y1, x0, y0);
  gy.addColorStop(0, 'rgba(42,190,217,0.85)');
  gy.addColorStop(1, 'rgba(42,190,217,0)');
  phaseCtx.strokeStyle = gy;
  phaseCtx.beginPath();
  phaseCtx.moveTo(x0, y1); phaseCtx.lineTo(x0, y0);
  phaseCtx.stroke();

  phaseCtx.restore();

  // Axis labels
  const fontSize = Math.round(W * 0.05);
  phaseCtx.save();
  phaseCtx.font = `${fontSize}px 'EB Garamond', Georgia, serif`;

  phaseCtx.textAlign = 'center';
  phaseCtx.textBaseline = 'top';
  phaseCtx.fillStyle = '#4db84a';
  phaseCtx.fillText('Resources', (x0 + x1) / 2, y1 + fontSize * 0.3);

  phaseCtx.translate(x0 - fontSize * 0.3, (y0 + y1) / 2);
  phaseCtx.rotate(-Math.PI / 2);
  phaseCtx.textAlign = 'center';
  phaseCtx.textBaseline = 'bottom';
  phaseCtx.fillStyle = '#ff6da2';
  phaseCtx.fillText('Foragers', 0, 0);

  phaseCtx.restore();
}

// ── Animation loop ─────────────────────────────────────────────────────────
function loop() {
  if (running) {
    for (let i = 0; i < stepsPerFrame; i++) simStep();
    drawSim();
    drawPhase();
  }
  frameId = requestAnimationFrame(loop);
}

// ── Layout ─────────────────────────────────────────────────────────────────
function layout() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const sFromW = (vw - 2 * PAD - GAP) / (1 + 1 / PHI);
  const sFromH = (vh - 2 * PAD) / 1.1;
  const S      = Math.floor(Math.min(sFromW, sFromH));
  const ctrlW  = Math.floor(S / PHI);
  const hdrH   = Math.floor(S * 0.1);
  const totalW = S + GAP + ctrlW;
  const left   = Math.floor((vw - totalW) / 2);
  const top    = Math.floor((vh - (hdrH + S)) / 2);

  const el = document.getElementById('fa-overlay');
  el.style.setProperty('--fa-left',     left         + 'px');
  el.style.setProperty('--fa-top-hdr',  top          + 'px');
  el.style.setProperty('--fa-top-body', (top + hdrH) + 'px');
  el.style.setProperty('--fa-W',        totalW       + 'px');
  el.style.setProperty('--fa-W-sim',    S            + 'px');
  el.style.setProperty('--fa-W-ctrl',   ctrlW        + 'px');
  el.style.setProperty('--fa-H-hdr',    hdrH         + 'px');
  el.style.setProperty('--fa-H-body',   S            + 'px');
  el.style.setProperty('--fa-gap',      GAP          + 'px');

  if (simCanvas) { simCanvas.width = S; simCanvas.height = S; }

  if (phaseCanvas) {
    const phaseSection = document.getElementById('fa-phase-section');
    const title        = document.getElementById('fa-phase-title');
    const sectionH     = Math.round(S * 0.5);
    const titleH       = title.offsetHeight || 32;
    const side         = Math.min(ctrlW - 16, sectionH - titleH - 8);
    phaseCanvas.width  = side;
    phaseCanvas.height = side;
    if (accumCanvas) resizeAccum();
  }
}

// ── Open / close ───────────────────────────────────────────────────────────
window.faOpen = function () {
  simCanvas   = document.getElementById('fa-sim-canvas');
  simCtx      = simCanvas.getContext('2d');
  phaseCanvas = document.getElementById('fa-phase-canvas');
  phaseCtx    = phaseCanvas.getContext('2d');

  layout();

  if (!initialized) { faInitSim(); initialized = true; }
  initAccum();

  document.getElementById('fa-overlay').classList.add('fa-open');
  requestAnimationFrame(() => {
    document.getElementById('fa-header').classList.add('fa-open');
    document.getElementById('fa-sim-panel').classList.add('fa-open');
    document.getElementById('fa-ctrl-panel').classList.add('fa-open');
  });

  running = true;
  document.getElementById('fa-btn-run').textContent = 'Pause';
  document.getElementById('fa-btn-run').classList.add('active');
  if (!frameId) frameId = requestAnimationFrame(loop);
};

window.faClose = function () {
  running = false;
  ['fa-header', 'fa-sim-panel', 'fa-ctrl-panel'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('fa-open');
    el.classList.add('fa-closing');
  });
  setTimeout(() => {
    document.getElementById('fa-overlay').classList.remove('fa-open');
    ['fa-header', 'fa-sim-panel', 'fa-ctrl-panel'].forEach(id => {
      document.getElementById(id).classList.remove('fa-closing');
    });
    if (frameId) { cancelAnimationFrame(frameId); frameId = null; }
    document.getElementById('fa-btn-run').textContent = 'Run';
    document.getElementById('fa-btn-run').classList.remove('active');
  }, 550);
};

// ── Controls ───────────────────────────────────────────────────────────────
document.getElementById('fa-btn-run').addEventListener('click', () => {
  running = !running;
  document.getElementById('fa-btn-run').textContent = running ? 'Pause' : 'Run';
  document.getElementById('fa-btn-run').classList.toggle('active', running);
  if (running && !frameId) frameId = requestAnimationFrame(loop);
});

document.getElementById('fa-btn-reset').addEventListener('click', () => {
  faInitSim(); clearAccum(); drawSim(); drawPhase();
});

document.getElementById('fa-sl-speed').addEventListener('input', function () {
  stepsPerFrame = parseInt(this.value);
});
document.getElementById('fa-sl-sense').addEventListener('input', function () {
  R_sense = parseFloat(this.value);
  if (!running && simCanvas) drawSim();
});
document.getElementById('fa-sl-vel').addEventListener('input', function () {
  vel = parseFloat(this.value);
});
document.getElementById('fa-sl-sigma').addEventListener('input', function () {
  sigma = parseFloat(this.value);
});
document.getElementById('fa-sl-xi').addEventListener('input', function () {
  Xi = parseFloat(this.value); epsilon = epsilonFromXi(Xi);
});

window.addEventListener('resize', () => { if (running) layout(); });

})();
</script>
