<!-- Quantum Tunneling Applet Include -->

<style>

#qtun-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 900;
  pointer-events: none;
}
#qtun-overlay.qtun-open {
  display: block;
  pointer-events: auto;
}

.qtun-panel {
  position: fixed;
  z-index: 910;
  background: #16212a;
  color: #eef2f5;
  font-family: 'EB Garamond', Georgia, serif;
  border: 2px solid transparent;
  border-radius: 14px;
  overflow: hidden;
  transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.0s ease;
  opacity: 0;
  pointer-events: none;
  box-sizing: border-box;
}
.qtun-panel.qtun-open {
  opacity: 1;
  pointer-events: auto;
}
.qtun-panel.qtun-closing {
  opacity: 1;
  pointer-events: none;
}

#qtun-header {
  border-color: var(--pink-dark, #f92672);
  box-shadow: 0 -8px 30px rgba(249,38,114,0.45), 0 8px 20px rgba(249,38,114,0.25);
  left:   var(--qtun-left);
  top:    var(--qtun-top-hdr);
  width:  var(--qtun-W);
  height: var(--qtun-H-hdr);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  transform: translateY(-120px);
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
}
#qtun-header.qtun-open { transform: translateY(0); }
#qtun-header h2 {
  font-size: 15px;
  letter-spacing: 2px;
  color: #eef2f5;
  font-weight: normal;
  margin: 0;
  text-transform: uppercase;
}
#qtun-close-btn {
  background: none;
  border: 1px solid #3d5a6e;
  color: #eef2f5;
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 13px;
  letter-spacing: 1px;
  padding: 3px 12px;
  border-radius: 4px;
  cursor: pointer;
}
#qtun-close-btn:hover { background: #2a3d4e; }

#qtun-sim-panel {
  border-color: var(--teal-dark, #23bbad);
  box-shadow: -12px 0 35px rgba(35,187,173,0.5), 0 12px 30px rgba(35,187,173,0.3);
  left:   var(--qtun-left);
  top:    var(--qtun-top-body);
  width:  var(--qtun-W);
  height: var(--qtun-H-sim);
  transform: translateX(-110vw);
  border-radius: 0;
}
#qtun-sim-panel.qtun-open { transform: translateX(0); }
#qtun-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

#qtun-ctrl-panel {
  border-color: var(--cyan, #2abed9);
  box-shadow: 0 12px 35px rgba(42,190,217,0.5), 0 -4px 20px rgba(42,190,217,0.3);
  left:   var(--qtun-left);
  top:    calc(var(--qtun-top-body) + var(--qtun-H-sim));
  width:  var(--qtun-W);
  height: var(--qtun-H-ctrl);

  flex-direction: row;
  align-items: center;
  justify-content: center;
  background: #1a2530;
  transform: translateY(110vh);
  padding: 0 24px;
  gap: 14px;
  border-top-left-radius: 0;
  border-top-right-radius: 0;
}
#qtun-ctrl-panel.qtun-open { transform: translateY(0); }

.qtun-btn {
  background: #2a3d4e;
  color: #eef2f5;
  border: 1px solid #3d5a6e;
  padding: 8px 22px;
  cursor: pointer;
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 17px;
  letter-spacing: 2px;
  border-radius: 6px;
  transition: background 0.15s;
  white-space: nowrap;

.qtun-btn:hover { background: #3a5060; }

  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #a8c0d0;
  white-space: nowrap;
}

  display: flex;
  align-items: center;
  gap: 6px;
}

  color: #a8c0d0;

  color: #eef2f5;

  text-align: left;
  font-variant-numeric: tabular-nums;

<div id="qtun-overlay">

  <div id="qtun-header" class="qtun-panel">

<script>
(function () {
  'use strict';

  /* ── Palette ── */
  const TEAL_DARK  = '#23bbad';
  const TEAL_LIGHT = '#25d9c8';
  const CYAN       = '#2abed9';
  const PINK_LIGHT = '#ff6da2';
  const PINK_DARK  = '#f92672';
  const BG         = '#0d1117';

  /* ── Physics (ℏ = 1, E = k²/(2M)) ── */
  const MASS = 3.0;   /* particle mass in units where ℏ=1 */
  const K0   = 24.0;  /* mean incident wavevector */

  /* ── Rendering ── */
  const PDF_SCALE   = 0.5;   /* multiplicative scale for pdf y-axis */
  const BARRIER_MAX = 180.0; /* maximum physical barrier height; must match slider max */

  const XMIN   = -8.0;
  const XMAX   =  12.0;
  const XSPAN  = XMAX - XMIN;
  const SIGMA_K = 2.5;    /* wide k-spread → narrow x-packet */
  const NK     = 512;
  const K_RANGE = 3.5;
  const NX     = 1427;

  /* Wavepacket initial centre: offset left of display scales as 1/M
     so that travel time into view is roughly mass-independent */
  function x0Physics() { return XMIN - 3.5 / MASS; }

  let simW, simH;   /* canvas pixel size */
  let canvas, ctx;
  let frameId = null;
  let simTime = 0;
  let firing  = false;
  let canFire = true;
  let probArmed = false;   /* true once total display prob has risen above arm threshold */
  let probPeak  = 0;       /* peak pTot seen while armed, used for relative reset threshold */
  let simSpeed = 0.12;

  let barrierH = 60.0;
  let barrierW = 0.8;

  /* scattering arrays */
  let kArr, wRe, wIm, tRe, tIm, rRe, rIm, aRe, aIm, bRe, bIm, kappa, modeType;

  /* ── Precompute scattering amplitudes ──
     Units: ℏ=2m=1, E=k². Barrier [0,a], height V0.

     Scattering state (unit incident flux from left):
       I   (x<0):   e^{ikx} + R·e^{-ikx}
       II  (0≤x≤a): E<V0: A·e^{κx}+B·e^{-κx}  κ=√(V0-E)
                    E>V0: A·e^{iqx}+B·e^{-iqx}  q=√(E-V0)
       III (x>a):   T·e^{ikx}

     Verified formulas (derived by solving 4×4 matching system):

     E < V0  (evanescent):
       D = 2kκ·cosh(κa) − i(k²−κ²)·sinh(κa)
       T = 2kκ·e^{−ika} / D
       R = −i(k²+κ²)·sinh(κa) / D
       A = k(κ+ik)·e^{−κa} / D
       B = k(κ−ik)·e^{+κa} / D

     E > V0  (oscillatory):
       D = 2kq·cos(qa) − i(k²+q²)·sin(qa)
       T = 2kq·e^{−ika} / D
       R = −i(k²−q²)·sin(qa) / D
       A = k(k+q)·e^{−iqa} / D   [note: k+q not q+ik]
       B = k(q−k)·e^{+iqa} / D
  */
  function precompute() {
    kArr     = new Float64Array(NK);
    wRe      = new Float64Array(NK);
    wIm      = new Float64Array(NK);
    tRe      = new Float64Array(NK);
    tIm      = new Float64Array(NK);
    rRe      = new Float64Array(NK);
    rIm      = new Float64Array(NK);
    aRe      = new Float64Array(NK);
    aIm      = new Float64Array(NK);
    bRe      = new Float64Array(NK);
    bIm      = new Float64Array(NK);
    kappa    = new Float64Array(NK);
    modeType = new Uint8Array(NK);

    const klo = Math.max(0.1, K0 - K_RANGE * SIGMA_K);
    const khi = K0 + K_RANGE * SIGMA_K;
    const dk  = (khi - klo) / (NK - 1);
    const x0  = x0Physics();
    const V0  = barrierH;
    const a   = barrierW;

    for (let j = 0; j < NK; j++) {
      const k = klo + j * dk;
      kArr[j] = k;
      const E = k * k / (2 * MASS);

      /* spectral weight φ(k)·Δk = cos²(π(k−K0)/(2·HW))·e^{-ikx0}·dk
         HW = half-width to first zero = K_RANGE·SIGMA_K = khi−K0.
         Compact support on [klo,khi] → exact zero at endpoints,
         no truncation error → perfect destructive interference outside packet. */
      const HW  = K_RANGE * SIGMA_K;
      const env = Math.cos(Math.PI * (k - K0) / (2 * HW));
      const cos2 = env * env;
      wRe[j] =  cos2 * Math.cos(k*x0) * dk;
      wIm[j] = -cos2 * Math.sin(k*x0) * dk;

      /* complex division helper: (nRe+i·nIm)/(dRe+i·dIm) */
      function cdiv(nRe, nIm, dRe, dIm) {
        const m = dRe*dRe + dIm*dIm;
        return { re: (nRe*dRe + nIm*dIm)/m,
                 im: (nIm*dRe - nRe*dIm)/m };
      }

      const cka = Math.cos(k*a), ska = Math.sin(k*a);

      /* With ℏ=1, the barrier wavevectors come from −ψ''/(2M) + V₀ψ = Eψ,
         so ψ'' = 2M(V₀−E)ψ (evanescent) or ψ'' = −2M(E−V₀)ψ (oscillatory).
         κ = √(2M(V₀−E)),  q = √(2M(E−V₀)).
         Note k = √(2ME) so k² = 2ME. */

      if (E < V0) {
        const kap = Math.sqrt(2 * MASS * (V0 - E));   /* = √(2M(V₀−E)) */
        kappa[j] = kap; modeType[j] = 0;

        const ch = Math.cosh(kap*a), sh = Math.sinh(kap*a);
        /* D = 2kκ·cosh(κa) + i(κ²−k²)·sinh(κa)
             = 2kκ·cosh(κa) − i(k²−κ²)·sinh(κa)
           k²−κ² = 2ME − 2M(V₀−E) = 2M(2E−V₀) = 2k²−twoMV0 */
        const k2mk2 = k*k - kap*kap;   /* = 2k²−2MV₀; note kap²=2M(V₀−E) */
        const dRe =  2*k*kap*ch;
        const dIm = -k2mk2*sh;

        /* T = 2kκ·e^{-ika} / D */
        const nTRe = 2*k*kap*cka, nTIm = -2*k*kap*ska;
        const T = cdiv(nTRe, nTIm, dRe, dIm);
        tRe[j] = T.re; tIm[j] = T.im;

        /* R = −i(k²+κ²)·sinh(κa) / D
           k²+κ² = 2ME + 2M(V₀−E) = 2MV₀ = twoMV0 */
        const nRRe = 0, nRIm = -(k*k + kap*kap)*sh;
        const R = cdiv(nRRe, nRIm, dRe, dIm);
        rRe[j] = R.re; rIm[j] = R.im;

        /* A = k(κ+ik)·e^{-κa} / D */
        const ema = Math.exp(-kap*a);
        const nARe = k*kap*ema, nAIm = k*k*ema;
        const Ac = cdiv(nARe, nAIm, dRe, dIm);
        aRe[j] = Ac.re; aIm[j] = Ac.im;

        /* B = k(κ−ik)·e^{+κa} / D */
        const epa = Math.exp( kap*a);
        const nBRe = k*kap*epa, nBIm = -k*k*epa;
        const Bc = cdiv(nBRe, nBIm, dRe, dIm);
        bRe[j] = Bc.re; bIm[j] = Bc.im;

      } else {
        const q = Math.sqrt(Math.max(2 * MASS * (E - V0), 1e-28));   /* = √(2M(E−V₀)) */
        kappa[j] = q; modeType[j] = 1;

        const cqa = Math.cos(q*a), sqa = Math.sin(q*a);
        /* D = 2kq·cos(qa) − i(k²+q²)·sin(qa)
           k²+q² = 2ME + 2M(E−V₀) = 2M(2E−V₀) = 2k²−twoMV0+2MV0...
           just use literal k²+q² which now correctly equals 2ME+2M(E-V0) */
        const dRe =  2*k*q*cqa;
        const dIm = -(k*k + q*q)*sqa;

        /* T = 2kq·e^{-ika} / D */
        const nTRe = 2*k*q*cka, nTIm = -2*k*q*ska;
        const T = cdiv(nTRe, nTIm, dRe, dIm);
        tRe[j] = T.re; tIm[j] = T.im;

        /* R = −i(k²−q²)·sin(qa) / D
           k²−q² = 2ME − 2M(E−V₀) = 2MV₀ = twoMV0 */
        const nRRe = 0, nRIm = -(k*k - q*q)*sqa;
        const R = cdiv(nRRe, nRIm, dRe, dIm);
        rRe[j] = R.re; rIm[j] = R.im;

        /* A = k(k+q)·e^{-iqa} / D  [from 2Ae^{iqa}=Te^{ika}(1+k/q)·e^{iqa}·e^{-iqa}...
           matching gives A = T·e^{i(k-q)a}·(k+q)/(2q), and k+q here means
           the momentum ratio (k+q)/(2q) with q=√(2M(E-V₀)) and k=√(2ME)] */
        const nARe = k*(k+q)*cqa, nAIm = -k*(k+q)*sqa;
        const Ac = cdiv(nARe, nAIm, dRe, dIm);
        aRe[j] = Ac.re; aIm[j] = Ac.im;

        /* B = k(q−k)·e^{+iqa} / D */
        const nBRe = k*(q-k)*cqa, nBIm = k*(q-k)*sqa;
        const Bc = cdiv(nBRe, nBIm, dRe, dIm);
        bRe[j] = Bc.re; bIm[j] = Bc.im;
      }
    }
  }

  /* ── Evaluate ψ(x,t) ── */
  function evalPsi(x, t) {
    let re = 0, im = 0;
    const a = barrierW;
    for (let j = 0; j < NK; j++) {
      const k  = kArr[j];
      const ph = -(k*k / (2*MASS))*t;
      const cph = Math.cos(ph), sph = Math.sin(ph);
      /* w(k)·e^{-iEt} */
      const wrRe = wRe[j]*cph - wIm[j]*sph;
      const wrIm = wRe[j]*sph + wIm[j]*cph;

      let spRe, spIm;

      if (x < 0) {
        /* e^{ikx} + R·e^{-ikx} */
        const ckx = Math.cos(k*x), skx = Math.sin(k*x);
        /* e^{ikx} = ckx + i·skx */
        /* R·e^{-ikx}: e^{-ikx} = ckx - i·skx */
        const rxRe = rRe[j]*ckx + rIm[j]*skx;   /* Re[(rRe+i·rIm)(ckx-i·skx)] */
        const rxIm = rIm[j]*ckx - rRe[j]*skx;
        spRe = ckx + rxRe;
        spIm = skx + rxIm;

      } else if (x <= a) {
        if (modeType[j] === 0) {
          /* A·e^{κx} + B·e^{-κx}  (A,B complex; κ real) */
          const kap = kappa[j];
          const epx = Math.exp( kap*x);
          const emx = Math.exp(-kap*x);
          spRe = aRe[j]*epx + bRe[j]*emx;
          spIm = aIm[j]*epx + bIm[j]*emx;
        } else {
          /* A·e^{iqx} + B·e^{-iqx}  (A,B complex; q real) */
          const q   = kappa[j];
          const cqx = Math.cos(q*x), sqx = Math.sin(q*x);
          /* A·e^{iqx} */
          const ax_re = aRe[j]*cqx - aIm[j]*sqx;
          const ax_im = aRe[j]*sqx + aIm[j]*cqx;
          /* B·e^{-iqx} */
          const bx_re = bRe[j]*cqx + bIm[j]*sqx;
          const bx_im = bIm[j]*cqx - bRe[j]*sqx;
          spRe = ax_re + bx_re;
          spIm = ax_im + bx_im;
        }
      } else {
        /* T·e^{ikx} */
        const ckx = Math.cos(k*x), skx = Math.sin(k*x);
        spRe = tRe[j]*ckx - tIm[j]*skx;
        spIm = tRe[j]*skx + tIm[j]*ckx;
      }

      re += wrRe*spRe - wrIm*spIm;
      im += wrRe*spIm + wrIm*spRe;
    }
    return { re, im };
  }

  /* ── Build arrays ── */
  function buildPsi(t) {
    const psiRe = new Float32Array(NX);
    const psiIm = new Float32Array(NX);
    const prob  = new Float32Array(NX);
    const flux  = new Float32Array(NX);
    for (let i = 0; i < NX; i++) {
      const x = XMIN + (i/(NX-1))*XSPAN;
      const { re, im } = evalPsi(x, t);
      psiRe[i] = re; psiIm[i] = im; prob[i] = re*re + im*im;
    }
    /* j = (1/M)(ψ_Re·∂ψ_Im/∂x − ψ_Im·∂ψ_Re/∂x), central differences */
    const dx = XSPAN / (NX - 1);
    for (let i = 0; i < NX; i++) {
      const i0 = Math.max(i-1, 0), i1 = Math.min(i+1, NX-1);
      const dRe = (psiRe[i1] - psiRe[i0]) / ((i1-i0)*dx);
      const dIm = (psiIm[i1] - psiIm[i0]) / ((i1-i0)*dx);
      flux[i] = (psiRe[i]*dIm - psiIm[i]*dRe) / MASS;
    }
    return { psiRe, psiIm, prob, flux };
  }

  /* ── Glow stroke ── */
  function strokeGlow(buildPath, glowColor, glowDim, mainColor) {
    ctx.save();
    ctx.shadowColor = glowColor; ctx.shadowBlur = 10;
    ctx.strokeStyle = glowDim;  ctx.lineWidth  = 2.5; ctx.globalAlpha = 0.5;
    buildPath(); ctx.stroke();
    ctx.restore();
    ctx.save();
    ctx.shadowColor = glowColor; ctx.shadowBlur = 18;
    ctx.strokeStyle = mainColor; ctx.lineWidth  = 1.8;
    buildPath(); ctx.stroke();
    ctx.restore();
  }

  /* ── Render ── */
  const YMAX_PSI  = 5.0;
  const YMAX_PROB = 28.8 / PDF_SCALE;
  const J_SCALE   = 0.01;   /* diagnostic: flux mapped as zy - plotH/2*(j*J_SCALE/YMAX_PSI) */

  function render(psiRe, psiIm, prob, flux = new Float32Array(NX)) {
    if (!canvas) return;
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, simW, simH);

    /* Layout in pixel space — no margins, fills canvas edge to edge */
    const plotH  = Math.floor(simH * 0.38);   /* each plot gets 38% height */
    const gapH   = Math.floor(simH * 0.06);
    const groundY = simH - Math.floor(simH * 0.18);  /* ground line at 82% down */
    const y1top  = Math.floor(simH * 0.04);
    const y2top  = groundY - plotH;

    /* barrier pixel x-coords */
    const xBarL = Math.round(simW * (-XMIN / XSPAN));
    const xBarR = Math.round(simW * ((-XMIN + barrierW) / XSPAN));

    /* barrier pixel height — scaled vs incident energy E0 = K0² = 9 */
    /* Barrier top mapped through the pdf y-axis: barrierH → toY2(barrierH),
       clamped so it never exceeds the plot top (y2top = groundY - plotH) */
    const yBarTop    = groundY - plotH * (barrierH / BARRIER_MAX);
    const barrierPixH = groundY - yBarTop;

    /* ── Crosshatch: ground slab + barrier, single shared hatch grid ── */
    const hatchColor = 'rgba(100,130,150,0.30)';
    const hatchLW    = Math.max(1, Math.round(simW * 0.003));
    const step       = Math.round(simW * 0.035);

    /* Hatch lines at 45° anchored to (0, groundY) so both ground and barrier
       share the same grid. Lines are drawn full-canvas-height tall so they
       pass through any clipping rect regardless of its y position. */
    function hatch(rx, ry, rw, rh) {
      if (rw <= 0 || rh <= 0) return;
      ctx.save();
      ctx.beginPath(); ctx.rect(rx, ry, rw, rh); ctx.clip();
      ctx.strokeStyle = hatchColor;
      ctx.lineWidth   = hatchLW;
      for (let d = -simH; d <= simW + simH; d += step) {
        ctx.beginPath();
        ctx.moveTo(d,        groundY);        /* anchor row = groundY */
        ctx.lineTo(d - simH, groundY + simH); /* extend simH px downward at 45° */
        ctx.stroke();
        /* also extend upward so barrier (above groundY) is covered */
        ctx.beginPath();
        ctx.moveTo(d,        groundY);
        ctx.lineTo(d + simH, groundY - simH);
        ctx.stroke();
      }
      ctx.restore();
    }

    /* ── Map helpers ── */
    function toX(i) { return (i / (NX-1)) * simW; }
    function toY1(v) { return y1top + plotH * (1 - (v + YMAX_PSI) / (2*YMAX_PSI)); }
    function toY2(v) { return groundY - plotH * (v / YMAX_PROB); }

    /* ── |ψ|² filled — drawn first, behind everything ── */
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(toX(0), groundY);
    for (let i=0;i<NX;i++) ctx.lineTo(toX(i), toY2(prob[i]));
    ctx.lineTo(toX(NX-1), groundY);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, groundY-plotH, 0, groundY);
    grad.addColorStop(0,   'rgba(42,190,217,0.85)');
    grad.addColorStop(0.6, 'rgba(42,190,217,0.55)');
    grad.addColorStop(1,   'rgba(42,190,217,0.20)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    strokeGlow(
      () => { ctx.beginPath(); for (let i=0;i<NX;i++) ctx.lineTo(toX(i), toY2(prob[i])); },
      CYAN, '#1a7a8a', CYAN
    );

    /* ── Incident energy line ── */
    const E0    = K0 * K0 / (2 * MASS);
    const yE0   = groundY - plotH * (E0 / BARRIER_MAX);
    if (yE0 >= groundY - plotH && yE0 <= groundY) {
      ctx.save();
      ctx.setLineDash([4, 6]);
      ctx.strokeStyle = 'rgba(255,109,162,0.55)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, yE0); ctx.lineTo(simW, yE0);
      ctx.stroke();
      ctx.restore();
    }

    /* ── Ground + barrier at 0.7 alpha, drawn over |ψ|² ── */
    ctx.save();
    ctx.globalAlpha = 0.7;

    /* ground: full width, from groundY to bottom of canvas */
    hatch(0, groundY, simW, simH - groundY);
    /* barrier: same grid, from yBarTop down to groundY */
    hatch(xBarL, yBarTop, xBarR - xBarL, barrierPixH);

    /* barrier outline */
    const lineColor = 'rgba(100,130,150,0.65)';
    ctx.strokeStyle = lineColor;
    ctx.lineWidth   = hatchLW * 1.5;
    ctx.beginPath();
    ctx.moveTo(xBarL, groundY);
    ctx.lineTo(xBarL, yBarTop);
    ctx.lineTo(xBarR, yBarTop);
    ctx.lineTo(xBarR, groundY);
    ctx.stroke();

    ctx.restore();

    /* dashed zero line for ψ plot */
    ctx.save();
    ctx.setLineDash([4, 5]);
    ctx.strokeStyle = 'rgba(168,192,208,0.28)';
    ctx.lineWidth = 1;
    const zy = y1top + plotH/2;
    ctx.beginPath(); ctx.moveTo(0, zy); ctx.lineTo(simW, zy); ctx.stroke();
    ctx.restore();

    /* Im(ψ) — pink */
    strokeGlow(
      () => { ctx.beginPath(); for (let i=0;i<NX;i++){const px=toX(i),py=toY1(psiIm[i]); i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);} },
      PINK_LIGHT, PINK_DARK, PINK_LIGHT
    );
    /* Re(ψ) — teal */
    strokeGlow(
      () => { ctx.beginPath(); for (let i=0;i<NX;i++){const px=toX(i),py=toY1(psiRe[i]); i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);} },
      TEAL_LIGHT, TEAL_DARK, TEAL_LIGHT
    );
    /* flux j — plain white, scaled by J_SCALE for diagnostics */
    const zyFlux = y1top + plotH / 2;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.75)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < NX; i++) {
      const px = toX(i), py = zyFlux - (plotH/2) * (flux[i] * J_SCALE / YMAX_PSI);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.restore();

    /* ── Probability diagnostics ── */
    const dxP = XSPAN / (NX - 1);
    let pL = 0, pB = 0, pR = 0;
    for (let i = 0; i < NX; i++) {
      const x = XMIN + i * dxP;
      const w = (i === 0 || i === NX-1) ? 0.5 : 1.0;
      const dP = prob[i] * w * dxP;
      if (x < 0)             pL += dP;
      else if (x <= barrierW) pB += dP;
      else                    pR += dP;
    }
    const pTot = pL + pB + pR;

    /* Place labels just above the ground line, centred in each region */
    const fs = Math.max(10, Math.round(simH * 0.022));
    ctx.save();
    ctx.font = `${fs}px monospace`;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.textBaseline = 'bottom';
    const yLabel = groundY - 4;

    /* left region: x in [XMIN,0] → pixels [0, xBarL] */
    ctx.textAlign = 'center';
    ctx.fillText(pL.toFixed(4), xBarL / 2, yLabel);

    /* barrier region: centred between xBarL and xBarR */
    ctx.fillText(pB.toFixed(4), (xBarL + xBarR) / 2, yLabel);

    /* right region: centred between xBarR and right edge */
    ctx.fillText(pR.toFixed(4), (xBarR + simW) / 2, yLabel);

    /* total: top-left corner */
    ctx.textAlign = 'left';
    ctx.fillText('tot=' + pTot.toFixed(4), 4, yLabel);

    ctx.restore();
  }

  /* ── Packet-gone check ── */
  function checkPacketGone(prob) {
    /* Only trigger once the packet has fully interacted with the barrier
       and both reflected + transmitted portions have left the display.
       Strategy: find the pixel column of the barrier, then check that
       probability in a wide interior band (excluding the outermost 8%)
       has collapsed to < 5% of total. This avoids false positives while
       the packet is still entering from the left. */
    const outerL = Math.floor(NX * 0.08);
    const outerR = NX - outerL;
    let interior = 0, total = 0;
    for (let i = 0; i < NX; i++) {
      total += prob[i];
      if (i >= outerL && i < outerR) interior += prob[i];
    }
    /* Also require a minimum simulation time proportional to mass
       so we don't trigger before the packet has even hit the barrier */
    const minTime = MASS * 0.8;
    return simTime > minTime && total > 1e-10 && interior / total < 0.05;
  }

  /* ── Fire button colour ── */
  function setFireReady(ready) {
    canFire = ready;
    const btn = document.getElementById('qtun-fire-btn');
    if (!btn) return;
    btn.classList.toggle('qtun-active-pink', ready);
    btn.classList.toggle('qtun-active-teal', !ready);
    const hSl = document.getElementById('qtun-height');
    const wSl = document.getElementById('qtun-width');
    if (hSl) hSl.disabled = !ready;
    if (wSl) wSl.disabled = !ready;
  }

  /* ── Animation loop ── */
  const DT = 1/60;
  function loop() {
    if (firing) {
      simTime += DT * simSpeed;
      const { psiRe, psiIm, prob, flux } = buildPsi(simTime);
      render(psiRe, psiIm, prob, flux);

      /* compute total display probability */
      const dxP = XSPAN / (NX - 1);
      let pTot = 0;
      for (let i = 0; i < NX; i++) {
        const w = (i === 0 || i === NX-1) ? 0.5 : 1.0;
        pTot += prob[i] * w * dxP;
      }

      /* arm once packet has entered the display */
      if (!probArmed && pTot > 0.5) { probArmed = true; probPeak = pTot; }

      /* track peak while armed */
      if (probArmed && pTot > probPeak) probPeak = pTot;

      /* auto-reset when displayed prob drops to 10% of its peak */
      if (probArmed && pTot < 0.10 * probPeak) {
        firing = false;
        probArmed = false;
        probPeak  = 0;
        setFireReady(true);
      }
    }
    frameId = requestAnimationFrame(loop);
  }

  /* ── Layout ── */
  function layout() {
    const PAD  = 20;
    const PHI  = 1.6180339887;
    const vw   = window.innerWidth;
    const vh   = window.innerHeight;

    const sFromW = (vw - 2*PAD) / (1 + 1/PHI);
    const sFromH = (vh - 2*PAD) / 1.1;
    const S      = Math.floor(Math.min(sFromW, sFromH));
    const totalW = Math.floor(S * (1 + 1/PHI));
    const W      = Math.min(totalW, vw - 2*PAD);
    const hdrH   = Math.floor(S * 0.1);
    const simHpx = Math.floor(S * 0.9);
    const ctrlH  = hdrH;
    const totalH = hdrH + simHpx + ctrlH;
    const left   = Math.floor((vw - W) / 2);
    const top    = Math.floor((vh - totalH) / 2);

    const ov = document.getElementById('qtun-overlay');
    ov.style.setProperty('--qtun-left',     left         + 'px');
    ov.style.setProperty('--qtun-top-hdr',  top          + 'px');
    ov.style.setProperty('--qtun-top-body', (top+hdrH)   + 'px');
    ov.style.setProperty('--qtun-W',        W            + 'px');
    ov.style.setProperty('--qtun-H-hdr',    hdrH         + 'px');
    ov.style.setProperty('--qtun-H-sim',    simHpx       + 'px');
    ov.style.setProperty('--qtun-H-ctrl',   ctrlH        + 'px');

    if (canvas) {
      canvas.width  = W;
      canvas.height = simHpx;
    }
    simW = W; simH = simHpx;
  }

  /* ── Init ── */
  function init() {
    simTime = 0; firing = false;
    precompute();
    render(new Float32Array(NX), new Float32Array(NX), new Float32Array(NX));
  }

  /* ── Open / Close ── */
  window.qtunOpen = function () {
    canvas = document.getElementById('qtun-canvas');
    ctx    = canvas.getContext('2d');
    layout();
    init();
    setFireReady(true);

    /* slider wiring */
    const speedSl = document.getElementById('qtun-speed');
    if (speedSl) { speedSl.value = simSpeed; speedSl.oninput = () => { simSpeed = parseFloat(speedSl.value); }; }

    const hSl = document.getElementById('qtun-height');
    if (hSl) hSl.max = BARRIER_MAX;
    if (hSl) hSl.oninput = function () {
      barrierH = parseFloat(this.value);
      document.getElementById('qtun-height-val').textContent = barrierH.toFixed(1);
      if (!firing) { precompute(); render(new Float32Array(NX), new Float32Array(NX), new Float32Array(NX)); }
    };

    const wSl = document.getElementById('qtun-width');
    if (wSl) wSl.oninput = function () {
      barrierW = parseFloat(this.value);
      document.getElementById('qtun-width-val').textContent = barrierW.toFixed(2);
      if (!firing) { precompute(); render(new Float32Array(NX), new Float32Array(NX), new Float32Array(NX)); }
    };

    document.getElementById('qtun-overlay').classList.add('qtun-open');
    requestAnimationFrame(() => {
      document.getElementById('qtun-header').classList.add('qtun-open');
      document.getElementById('qtun-sim-panel').classList.add('qtun-open');
      document.getElementById('qtun-ctrl-panel').classList.add('qtun-open');
    });

    if (!frameId) frameId = requestAnimationFrame(loop);
  };

  window.qtunClose = function () {
    firing = false;
    ['qtun-header','qtun-sim-panel','qtun-ctrl-panel'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('qtun-open');
      el.classList.add('qtun-closing');
    });
    setTimeout(() => {
      document.getElementById('qtun-overlay').classList.remove('qtun-open');
      ['qtun-header','qtun-sim-panel','qtun-ctrl-panel'].forEach(id => {
        document.getElementById(id).classList.remove('qtun-closing');
      });
      if (frameId) { cancelAnimationFrame(frameId); frameId = null; }
    }, 550);
  };

  window.qtunFire = function () {
    if (!canFire) return;
    setFireReady(false);
    simTime = 0; probArmed = false; probPeak = 0; precompute(); firing = true;
  };

  window.qtunPause = function () {
    if (!probArmed) return;   /* nothing running */
    firing = !firing;
    const btn = document.getElementById('qtun-pause-btn');
    if (btn) btn.textContent = firing ? 'Pause' : 'Resume';
  };

  window.qtunReset = function () {
    firing = false; simTime = 0; setFireReady(true);
    const btn = document.getElementById('qtun-pause-btn');
    if (btn) btn.textContent = 'Pause';
    if (canvas) render(new Float32Array(NX), new Float32Array(NX), new Float32Array(NX));
  };

  window.addEventListener('resize', layout);

})();
</script>
