<!DOCTYPE html>
<html lang="en">
<head>
  {%- include head.txt -%}
  {%- if site.google_analytics -%}{%- include google-analytics.html -%}{%- endif -%}

  <title>{{ page.title | escape }} — My Favorite Spacetimes</title>
  <link rel="stylesheet" href="{{ '/assets/css/palette.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/mfs.css' | relative_url }}">

  <script>
    /* ── Device detection — runs before first paint ── */
    (function () {
      var touch    = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
      var narrow   = window.innerWidth <= 768;
      var ua       = navigator.userAgent || '';
      var mobileUA = /Android|iPhone|iPad|iPod|Mobile/i.test(ua);
      if (touch && (narrow || mobileUA)) {
        document.documentElement.classList.add('is-mobile');
      } else {
        document.documentElement.classList.add('is-desktop');
      }
    })();
  </script>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

  <canvas id="wavy-grid" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;"></canvas>

  <a id="mfs-exit" href="{{ '/' | relative_url }}" style="position:fixed;top:0.9em;right:0.8em;z-index:20;font-family:'Source Code Pro',monospace !important;font-size:1.7em;color:var(--teal-light);text-decoration:none;letter-spacing:0.05em;line-height:1.2;">Exit</a>

<div id="mfs-search-panel" style="position:fixed;z-index:15;box-sizing:border-box;border-radius:0 12px 12px 0;
    width:280px;height:320px;
    background:rgba(0,0,0,0.8);border:2px solid var(--cyan);border-left:none;
    box-shadow:0 0 2px var(--cyan),0 0 10px var(--cyan),0 0 20px var(--cyan),0 0 30px var(--cyan);overflow:hidden;pointer-events:none;
    padding:1em; display:flex; flex-direction:column; gap:0.6em;">
  <input id="mfs-search-input" type="text" placeholder="Search spacetimes…"
    style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--cyan);border-radius:4px;
    color:var(--text-bright);padding:0.4em 0.6em;font-family:'Source Code Pro',monospace;font-size:0.85em;
    outline:none;box-sizing:border-box; flex-shrink:0;">
  <div id="mfs-search-results" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;"></div>
  </div>

  <script>
    /* ── MFS search: simple filter over metric index ── */
    (function() {
      // Metric index — id matches JSON filename in MFS/assets/data/metrics/
      // Will be replaced by Lunr.js index later
      var METRIC_INDEX = [
        { id: 'minkowski',    name: 'Minkowski',    tags: ['flat', 'special relativity', 'vacuum'] },
        { id: 'ellis_bronnikov', name: 'Ellis-Bronnikov', tags: ['wormhole', 'exotic matter', 'traversable'] },
        { id: 'frw', name: 'FLRW', tags: ['cosmology', 'expanding universe', 'homogeneous', 'isotropic', 'FLRW'] },
        { id: 'schwarzschild', name: 'Schwarzschild', tags: ['vacuum', 'static', 'spherically symmetric', 'black hole', 'exact solution'] }
      ];

      var input   = document.getElementById('mfs-search-input');
      var results = document.getElementById('mfs-search-results');
      if (!input || !results) return;

      function renderResults(query) {
        var q = query.trim().toLowerCase();
        var matches = q === ''
          ? METRIC_INDEX
          : METRIC_INDEX.filter(function(m) {
              return m.name.toLowerCase().indexOf(q) !== -1 ||
                     m.tags.some(function(t) { return t.indexOf(q) !== -1; });
            });

        results.innerHTML = matches.map(function(m) {
          return '<div class="mfs-result" data-id="' + m.id + '">' + m.name + '</div>';
        }).join('');

        results.querySelectorAll('.mfs-result').forEach(function(el) {
          el.addEventListener('click', function() {
            if (window._mfsSlideInRight) window._mfsSlideInRight();
            if (window._mfsShowMetric) window._mfsShowMetric(this.dataset.id);
            results.querySelectorAll('.mfs-result').forEach(function(r) { r.classList.remove('mfs-result-active'); });
            el.classList.add('mfs-result-active');
          });
        });
      }

      input.addEventListener('input', function() { renderResults(this.value); });
      renderResults('');
    })();
  </script>

  <style>
    .mfs-result {
      padding: 5px 8px;
      font-family: 'Source Code Pro', monospace;
      font-size: 18px;
      color: var(--teal-light);
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    .mfs-result:hover, .mfs-result-active {
      background: rgba(0,229,255,0.1);
      color: var(--cyan);
    }
  </style>

  <div id="mfs-title" style="position:fixed;top:0.6em;left:0.8em;z-index:20;font-family:'Source Code Pro',monospace;font-size:2.2em;letter-spacing:0.08em;line-height:1.2;pointer-events:none;max-width:calc(100% - 7em);"></div>

  <div id="mfs-content-panel" style="position:fixed;z-index:15;box-sizing:border-box;border-radius:12px 0 0 12px;
    top:150px;right:-100%;
    background:rgba(0,0,0,0.8);border:2px solid var(--cyan);border-right:none;
    box-shadow:0 0 2px var(--cyan),0 0 10px var(--cyan),0 0 20px var(--cyan),0 0 30px var(--cyan);
    overflow-y:auto;pointer-events:none;padding:1em;">
  </div>

  <script>
    /* ════════════════════════════════════════════════
       MFS WAVE CANVAS — multi-panel
       ════════════════════════════════════════════════ */
    (function () {

      // ── Base wave ──
      var BASE_AMPLITUDE = 0.25;
      var BASE_SPEED     = 0.055;

      // ── Lambda: vertical taper as function of normalised y ──
      function lambda(yNorm) {
        return 0.95 + 0.1 * yNorm;
      }

      // ── Panel definition ──
      // Each panel: { amplitude, scale, x0, x1, y0, y1, anchorEl (optional) }
      //   anchorEl: DOM element whose getBoundingClientRect drives x0/x1/y0/y1
      //   If anchorEl is set, x0/x1/y0/y1 are recomputed on every resize().
      var panels = [
        // 0: title panel — affixed to #mfs-title
        { amplitude: 50,  sigmaX: 10, sigmaY: 20, scale: 0, backSolve: true,  anchorEl: null, x0:0, x1:0, y0:0, y1:0 },
        // 1: exit panel — affixed to #mfs-exit
        { amplitude: 30,  sigmaX: 10, sigmaY: 15, scale: 0, backSolve: true,  anchorEl: null, x0:0, x1:0, y0:0, y1:0 },
      ];

      // Attach DOM anchors after DOM is ready (elements exist at script run time)
      panels[0].anchorEl = document.getElementById('mfs-title');
      panels[1].anchorEl = document.getElementById('mfs-exit');
      window._mfsPanels = panels;
      window._mfsDisplace = displace;
      // displaceAt: evaluate displacement with a specific scale for panel panelIdx
      window._mfsDisplaceAt = function(x, y, panelIdx, scaleVal) {
        var p   = panels[panelIdx];
        var w   = p.x1 - p.x0;
        var h   = p.y1 - p.y0;
        if (w < 1 || h < 1) return {dx:0, dy:0};
        var tx  = (x - p.x0) / w;
        var ty  = (y - p.y0) / h;
        var lam = lambda(Math.max(0, Math.min(1, ty)));
        var W   = panelWx(p, tx, ty) * panelWy(p, tx, ty);
        if (W < 0.0001) return {dx:0, dy:0};
        return {
          dx:  scaleVal * p.amplitude * W * (tx - 0.5) * lam,
          dy: -scaleVal * p.amplitude * W * lam
        };
      };

      // ── Flicker state ──
      var _flickerOpacity = 0.28;
      var _flickerTarget  = 0.28;
      var _flickerTimer   = 0;

      /* ─── canvas setup ─── */
      var canvas = document.getElementById('wavy-grid');
      var ctx    = canvas.getContext('2d');
      var t      = 0;

      var cs      = getComputedStyle(document.documentElement);
      var tealRgb = cs.getPropertyValue('--teal-dark-rgb').trim();
      var pinkRgb = cs.getPropertyValue('--pink-dark-rgb').trim();
      canvas.style.backgroundColor = cs.getPropertyValue('--bg-black').trim();

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        panels.forEach(function(p) {
          if (p.anchorEl) {
            var r    = p.anchorEl.getBoundingClientRect();
            var lam0 = lambda(0);
            var lam1 = lambda(1);
            p.x0 = r.left;
            p.x1 = r.right;
            if (p.backSolve) {
              // y: back-solve so element sits at plateau peak
              p.y0 = r.top    + p.amplitude * lam0;
              p.y1 = r.bottom + p.amplitude * lam1;
            } else {
              // y: use element bounds directly — plateau matches element
              p.y0 = r.top;
              p.y1 = r.bottom;
            }
          } else {
            var lam0 = lambda(0);
            var lam1 = lambda(1);
            var fx0  = canvas.width  * p.x0frac;
            var fx1  = canvas.width  * p.x1frac;
            var fy0  = canvas.height * p.y0frac;
            var fy1  = canvas.height * p.y1frac;
            p.x0 = fx0 + 0.5 * p.amplitude * lam0;
            p.x1 = fx1 - 0.5 * p.amplitude * lam0;
            p.y0 = fy0 + p.amplitude * lam0;
            p.y1 = fy1 + p.amplitude * lam1;
          }
        });
      }

      /* Per-panel window functions in normalised coords */
      function panelWx(p, tx, ty) {
        var lam  = lambda(Math.max(0, Math.min(1, ty)));
        var sigX = lam * p.sigmaX / (p.x1 - p.x0);
        return 0.5 * (1 + Math.tanh((tx + 2*sigX) / sigX)) *
               0.5 * (1 - Math.tanh((tx - (1 + 2*sigX)) / sigX));
      }
      function panelWy(p, tx, ty) {
        var lam  = lambda(Math.max(0, Math.min(1, ty)));
        var sigY = lam * p.sigmaY / (p.y1 - p.y0);
        return 0.5 * (1 + Math.tanh((ty + 2*sigY) / sigY)) *
               0.5 * (1 - Math.tanh((ty - (1 + 2*sigY)) / sigY));
      }

      /* Max displacement from all panels (no superposition) */
      function displace(x, y) {
        var bestDx = 0, bestDy = 0, bestMag = 0;
        for (var i = 0; i < panels.length; i++) {
          var p  = panels[i];
          if (p.scale < 0.0001) continue;
          var w  = p.x1 - p.x0;
          var h  = p.y1 - p.y0;
          if (w < 1 || h < 1) continue;
          var tx  = (x - p.x0) / w;
          var ty  = (y - p.y0) / h;
          var lam = lambda(Math.max(0, Math.min(1, ty)));
          var W   = panelWx(p, tx, ty) * panelWy(p, tx, ty);
          if (W < 0.0001) continue;
          var dx  =  p.scale * p.amplitude * W * (tx - 0.5) * lam;
          var dy  = -p.scale * p.amplitude * W * lam;
          var mag = dx*dx + dy*dy;
          if (mag > bestMag) { bestMag = mag; bestDx = dx; bestDy = dy; }
        }
        return {dx: bestDx, dy: bestDy};
      }

      // ── Displacement grid cache (recomputed each frame at grid resolution) ──
      var _dispGrid = null;  // flat array of {dx,dy}, row-major
      var _gridCols = 0;
      var _gridRows = 0;
      var SPACING   = 20;

      function buildDispGrid() {
        var cols = Math.ceil(canvas.width  / SPACING) + 2;
        var rows = Math.ceil(canvas.height / SPACING) + 2;
        if (cols !== _gridCols || rows !== _gridRows) {
          _gridCols = cols;
          _gridRows = rows;
          _dispGrid = new Array(cols * rows);
        }
        for (var row = 0; row < rows; row++) {
          for (var col = 0; col < cols; col++) {
            _dispGrid[row * cols + col] = displace(col * SPACING, row * SPACING);
          }
        }
      }

      function displaceInterp(x, y) {
        var col = x / SPACING;
        var row = y / SPACING;
        var c0  = Math.floor(col);
        var r0  = Math.floor(row);
        var c1  = c0 + 1;
        var r1  = r0 + 1;
        var fc  = col - c0;
        var fr  = row - r0;
        // clamp
        c0 = Math.max(0, Math.min(_gridCols - 1, c0));
        c1 = Math.max(0, Math.min(_gridCols - 1, c1));
        r0 = Math.max(0, Math.min(_gridRows - 1, r0));
        r1 = Math.max(0, Math.min(_gridRows - 1, r1));
        var d00 = _dispGrid[r0 * _gridCols + c0];
        var d10 = _dispGrid[r0 * _gridCols + c1];
        var d01 = _dispGrid[r1 * _gridCols + c0];
        var d11 = _dispGrid[r1 * _gridCols + c1];
        return {
          dx: d00.dx*(1-fc)*(1-fr) + d10.dx*fc*(1-fr) + d01.dx*(1-fc)*fr + d11.dx*fc*fr,
          dy: d00.dy*(1-fc)*(1-fr) + d10.dy*fc*(1-fr) + d01.dy*(1-fc)*fr + d11.dy*fc*fr
        };
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 2;

        // Precompute displacement grid once per frame
        buildDispGrid();

        // flicker driven by max scale across all panels
        var maxP = 0;
        for (var i = 0; i < panels.length; i++) maxP = Math.max(maxP, panels[i].scale);
        var flickerStrength = 4 * maxP * (1 - maxP);
        if (flickerStrength > 0.01) {
          var lo = 0.10;
          var hi = 0.28 + flickerStrength * 1.2;
          _flickerOpacity = lo + Math.random() * (hi - lo);
        } else {
          _flickerOpacity += (0.28 - _flickerOpacity) * 0.2;
        }

        var grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        grad.addColorStop(0, 'rgba(' + tealRgb + ', ' + _flickerOpacity + ')');
        grad.addColorStop(1, 'rgba(' + pinkRgb + ', ' + _flickerOpacity + ')');
        ctx.strokeStyle = grad;
        var glowStrength = (_flickerOpacity - 0.10) / (0.28 + 1.2 - 0.10);
        if (glowStrength > 0.01) {
          ctx.shadowBlur  = glowStrength * 18;
          ctx.shadowColor = 'rgba(' + tealRgb + ', ' + _flickerOpacity + ')';
        } else {
          ctx.shadowBlur = 0;
        }

        for (var y = 0; y < canvas.height + SPACING; y += SPACING) {
          ctx.beginPath();
          for (var x = 0; x <= canvas.width; x += 2) {
            var wave = BASE_AMPLITUDE * Math.sin((x / 80) + (y / 120) + t);
            var d    = displaceInterp(x, y);
            var yd   = y + wave + d.dy;
            if (x === 0) ctx.moveTo(x + d.dx, yd);
            else         ctx.lineTo(x + d.dx, yd);
          }
          ctx.stroke();
        }
        for (var x = 0; x < canvas.width + SPACING; x += SPACING) {
          ctx.beginPath();
          for (var y = 0; y <= canvas.height; y += 2) {
            var wave = BASE_AMPLITUDE * Math.sin((y / 80) + (x / 120) + t);
            var d    = displaceInterp(x, y);
            var xd   = x + wave + d.dx;
            var yd   = y + d.dy;
            if (y === 0) ctx.moveTo(xd, yd);
            else         ctx.lineTo(xd, yd);
          }
          ctx.stroke();
        }


        t += BASE_SPEED;
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      resize();
      // Re-anchor after fonts settle
      document.fonts.ready.then(function() { resize(); });
      // Expose so flicker-in script can re-anchor after spans are built
      window._mfsResize = resize;

      // ── Staggered ramp-up on load ──
      var RAMP_DURATION = 1000;
      var STAGGER_MS    = 100;

      function rampPanelUp(panel, startDelay) {
        setTimeout(function() {
          var t0 = null;
          function step(ts) {
            if (!t0) t0 = ts;
            var p = Math.min((ts - t0) / RAMP_DURATION, 1);
            var e = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
            panel.scale = e;
            if (p < 1) requestAnimationFrame(step);
          }
          requestAnimationFrame(step);
        }, startDelay);
      }

      panels.forEach(function(panel, i) {
        rampPanelUp(panel, i * STAGGER_MS);
      });

      // ── Expose ramp-down for exit transition ──
      window._mfsRampDown = function(duration, onDone) {
        var snapshots = panels.map(function(p) { return p.scale; });
        var t0 = null;
        // stagger: last panel starts first (reverse order)
        var n = panels.length;
        panels.forEach(function(panel, i) {
          var delay = (n - 1 - i) * STAGGER_MS;
          var snap  = snapshots[i];
          setTimeout(function() {
            var t0i = null;
            function step(ts) {
              if (!t0i) t0i = ts;
              var p = Math.min((ts - t0i) / duration, 1);
              var e = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
              panel.scale = snap * (1 - e);
              if (p < 1) requestAnimationFrame(step);
              else if (i === 0 && onDone) onDone();
            }
            requestAnimationFrame(step);
          }, delay);
        });
      };

      // Keep legacy _mfsPlateau readable (max across panels)
      try {
        Object.defineProperty(window, '_mfsPlateau', {
          configurable: true,
          get: function() {
            var m = 0;
            for (var i = 0; i < panels.length; i++) m = Math.max(m, panels[i].scale);
            return m;
          }
        });
      } catch(e) {}

      draw();

    })();
  </script>

  <script>
    /* ── MFS neon flicker-in (title + exit sign) ── */
    (function() {
      var cs        = getComputedStyle(document.documentElement);
      var tealLight = cs.getPropertyValue('--teal-light').trim();
      var pinkLight = cs.getPropertyValue('--pink-light').trim();

      var STAGGER_MS = 60;
      var FLICKER_MS = 180;

      // Per-element generation counters keyed by element id
      var _flickerGens = {};

      // Shared letter-tracking loop — one rAF for all tracked letters
      // Re-register all spans in an element for tracking during ramp-down (no-op now)
      window._mfsTrackEl = function() {};

      function flickerLetter(span, startTime, elId, gen) {
        if (gen !== _flickerGens[elId]) return;
        var elapsed = Date.now() - startTime;
        if (elapsed < FLICKER_MS) {
          var r = Math.random();
          if (r < 0.45) {
            span.style.opacity    = '1';
            span.style.color      = tealLight;
            span.style.textShadow =
              '0 0 8px ' + tealLight + ', 0 0 20px ' + tealLight + ', 0 0 40px ' + tealLight;
          } else if (r < 0.65) {
            span.style.opacity    = '0.15';
            span.style.textShadow = 'none';
          } else if (r < 0.85) {
            span.style.opacity    = '1';
            span.style.color      = pinkLight;
            span.style.textShadow =
              '0 0 8px ' + pinkLight + ', 0 0 20px ' + pinkLight;
          } else {
            span.style.opacity = '0.5';
          }
          setTimeout(function() { flickerLetter(span, startTime, elId, gen); }, 30 + Math.random() * 40);
        } else {
          span.style.opacity    = '1';
          span.style.color      = tealLight;
          span.style.textShadow = '0 0 6px ' + tealLight + ', 0 0 14px ' + tealLight;
          span.style.transition = 'text-shadow 0.4s ease';
        }
      }

      function flickerIn(el, text, startDelay, panelIdx, priorityIndices) {
        if (!el) return;
        var elId = el.id || ('el_' + Math.random());
        _flickerGens[elId] = (_flickerGens[elId] || 0) + 1;
        var gen = _flickerGens[elId];
        el.innerHTML = '';
        var spans = [];
        for (var i = 0; i < text.length; i++) {
          var span = document.createElement('span');
          span.textContent      = text[i];
          span.style.opacity    = '0';
          span.style.display    = 'inline-block';
          span.style.whiteSpace = 'pre';
          if (text[i] === ' ') span.style.fontSize = '0.5em';
          el.appendChild(span);
          spans.push(span);
        }
        var SPREAD_MS = spans.length * STAGGER_MS;

        // Priority indices: letters that flicker in first (before the random spread)
        var PRIORITY_AFTER_MS = 120;
        for (var j = 0; j < spans.length; j++) {
          (function(span, idx) {
            var isPriority = priorityIndices && priorityIndices.indexOf(idx) !== -1;
            var delay = isPriority
              ? startDelay + Math.random() * FLICKER_MS
              : startDelay + PRIORITY_AFTER_MS + Math.random() * SPREAD_MS;
            setTimeout(function() {
              flickerLetter(span, Date.now(), elId, gen);
            }, delay);
          })(spans[j], j);
        }
      }

      var titleText = 'My Favorite Spacetimes';
      var exitText  = 'Exit';
      document.fonts.ready.then(function() {
        flickerIn(document.getElementById('mfs-title'), titleText, 0, 0, [0, 3, 12]);
        flickerIn(document.getElementById('mfs-exit'),  exitText,  270, 1);
        // Re-anchor panels now that spans are built and elements have size
        if (window._mfsResize) window._mfsResize();
      });
    })();
  </script>

  <script>
    /* ── MFS search panel animation: slide in from off-screen left ── */
    (function() {
      var el = document.getElementById('mfs-search-panel');
      if (!el) return;

      var PANEL_TOP   = 150;   // px from top of viewport — adjust once content is added
      var PANEL_LEFT  = 0;     // flush with left edge of window
      var PANEL_W     = 280;
      var PANEL_H     = 320;
      var SLIDE_DELAY = 800;   // ms after flicker-in starts
      var SLIDE_DUR   = 500;   // ms for the slide

      // Set fixed size and top; start off-screen left
      el.style.top    = PANEL_TOP + 'px';
      el.style.left   = (-PANEL_W - 20) + 'px';
      el.style.width  = PANEL_W + 'px';
      el.style.height = PANEL_H + 'px';

      function syncPanel() {
        el.style.top    = PANEL_TOP + 'px';
        el.style.width  = PANEL_W + 'px';
        el.style.height = PANEL_H + 'px';
      }
      window._mfsSyncPanel = syncPanel;
      window.addEventListener('resize', syncPanel);

      // Slide in after delay
      setTimeout(function() {
        el.style.transition = 'left ' + SLIDE_DUR + 'ms cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        el.style.left       = PANEL_LEFT + 'px';
        setTimeout(function() {
          el.style.pointerEvents = 'all';
          el.style.transition    = '';
        }, SLIDE_DUR);
      }, SLIDE_DELAY);

    })();
  </script>

  <script>
    /* ── MFS content panel: slide in from off-screen right ── */
    (function() {
      var el = document.getElementById('mfs-content-panel');
      if (!el) return;

      var LEFT_PANEL_W  = 280;
      var GAP           = 20;
      var PANEL_TOP     = 150;
      var SLIDE_DELAY   = 800;
      var SLIDE_DUR     = 500;

      function syncPanel() {
        var vw = window.innerWidth;
        var panelW = vw - LEFT_PANEL_W - GAP;
        el.style.top    = PANEL_TOP + 'px';
        el.style.width  = panelW + 'px';
        el.style.height = (window.innerHeight - PANEL_TOP - 20) + 'px';
      }

      // Start off-screen right
      el.style.right = '0';
      el.style.transform = 'translateX(100%)';
      syncPanel();
      window.addEventListener('resize', syncPanel);

      var _slid = false;
      // Expose for search result click to trigger
      window._mfsSlideInRight = function() {
        if (_slid) return;
        _slid = true;
        el.style.transition = 'transform ' + SLIDE_DUR + 'ms cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        el.style.transform  = 'translateX(0)';
        setTimeout(function() {
          el.style.pointerEvents = 'all';
          el.style.transition    = '';
        }, SLIDE_DUR);
      };

      // Expose for exit transition
      window._mfsSlideOutRight = function(duration) {
        el.style.transition = 'transform ' + duration + 'ms cubic-bezier(0.55, 0.06, 0.68, 0.19)';
        el.style.transform  = 'translateX(100%)';
      };
    })();
  </script>

  <script>
    /* ── MFS metric renderer ── */
    (function() {
      var contentPanel = document.getElementById('mfs-content-panel');
      if (!contentPanel) return;

      var _metricCache = {};  // id → parsed JSON
      var _bibCache = null;   // cite key → parsed entry
      var _currentMetric = null;
      var _currentCoordIdx = 0;

      // Fetch and parse the global .bib file into a lookup table
      function fetchBib(cb) {
        if (_bibCache) { cb(_bibCache); return; }
        var url = '{{ "/assets/data/references.bib" | relative_url }}';
        fetch(url)
          .then(function(r) { return r.text(); })
          .then(function(text) {
            _bibCache = {};
            // Split on @ but keep the @ by using a lookahead-style split
            var entries = text.split(/(?=@\w+\s*\{)/);
            entries.forEach(function(entry) {
              entry = entry.trim();
              if (!entry) return;
              var keyMatch = entry.match(/^@\w+\s*\{\s*([\w:]+)\s*,/);
              if (keyMatch) _bibCache[keyMatch[1]] = entry;
            });
            cb(_bibCache);
          })
          .catch(function(e) { console.error('Failed to load references.bib', e); cb({}); });
      }

      function fetchMetric(id, cb) {
        if (_metricCache[id]) { cb(_metricCache[id]); return; }
        var url = '{{ "/MFS/assets/data/metrics/" | relative_url }}' + id + '.json';
        fetch(url)
          .then(function(r) { return r.json(); })
          .then(function(data) { _metricCache[id] = data; cb(data); })
          .catch(function(e) { console.error('Failed to load metric:', id, e); });
      }

      function tex(str) {
        return '\\(' + str + '\\)';
      }

      function unlatex(str) {
        return str
          .replace(/\\["']([aeiouAEIOUy])/g, function(_, c) {
            return { a:'ä',e:'ë',i:'ï',o:'ö',u:'ü',A:'Ä',E:'Ë',I:'Ï',O:'Ö',U:'Ü',y:'ÿ' }[c] || c;
          })
          .replace(/\\'([aeiouAEIOUy])/g, function(_, c) {
            return { a:'á',e:'é',i:'í',o:'ó',u:'ú',A:'Á',E:'É',I:'Í',O:'Ó',U:'Ú',y:'ý' }[c] || c;
          })
          .replace(/\\`([aeiouAEIOU])/g, function(_, c) {
            return { a:'à',e:'è',i:'ì',o:'ò',u:'ù',A:'À',E:'È',I:'Ì',O:'Ò',U:'Ù' }[c] || c;
          })
          .replace(/\\\^([aeiouAEIOU])/g, function(_, c) {
            return { a:'â',e:'ê',i:'î',o:'ô',u:'û',A:'Â',E:'Ê',I:'Î',O:'Ô',U:'Û' }[c] || c;
          })
          .replace(/\\~([nNaAoO])/g, function(_, c) {
            return { n:'ñ',N:'Ñ',a:'ã',A:'Ã',o:'õ',O:'Õ' }[c] || c;
          })
          .replace(/\\c\{?([cCsS])\}?/g, function(_, c) {
            return { c:'ç',C:'Ç',s:'ş',S:'Ş' }[c] || c;
          })
          .replace(/\\ss\b/g, 'ß')
          .replace(/\{([^}]*)\}/g, '$1')  // strip remaining braces
          .trim();
      }

      function parseBibtex(entry) {
        // Extract type and key: @article{key, ...}
        var typeKey = entry.match(/^@(\w+)\s*\{\s*([\w:]+)\s*,/);
        var type = typeKey ? typeKey[1].toLowerCase() : 'misc';
        // Extract fields: field = {value} or field = "value"
        var fields = {};
        var fieldRe = /(\w+)\s*=\s*(?:\{([^}]*(?:\{[^}]*\}[^}]*)*)\}|"([^"]*)")/g;
        var m;
        while ((m = fieldRe.exec(entry)) !== null) {
          fields[m[1].toLowerCase()] = unlatex(m[2] !== undefined ? m[2] : m[3]);
        }
        return { type: type, fields: fields };
      }

      function formatBibtex(entry) {
        var p = parseBibtex(entry);
        var f = p.fields;
        var author  = f.author  || '';
        var title   = f.title   || '';
        var year    = f.year    || '';
        var journal = f.journal || f.booktitle || f.publisher || '';
        var volume  = f.volume  || '';
        var pages   = f.pages   || '';
        var html = '';
        if (author)  html += '<span class="mfs-ref-author">' + author + '</span> ';
        if (year)    html += '<span class="mfs-ref-year">(' + year + ')</span>. ';
        if (title)   html += '<span class="mfs-ref-title">' + title + '</span>. ';
        if (journal) html += '<span class="mfs-ref-journal">' + journal + '</span>';
        if (volume)  html += ' <span class="mfs-ref-volume">' + volume + '</span>';
        if (pages)   html += ', ' + pages;
        return html || entry;
      }

      function makeIdxStr(c, conv) {
        var idxStr = '';
        var state  = null;
        for (var k = 0; k < conv.length; k++) {
          var ch  = conv[k];
          var idx = c.indices[k] || '';
          if (ch === 'u') {
            if (state === 'l') { idxStr += '}'; state = null; }
            if (state !== 'u') { idxStr += '^{'; state = 'u'; }
            else { idxStr += ' '; }
            idxStr += idx;
          } else {
            if (state === 'u') { idxStr += '}'; state = null; }
            if (state !== 'l') {
              idxStr += (idxStr.length > 0 ? '{}' : '') + '_{';
              state = 'l';
            } else {
              idxStr += ' ';
            }
            idxStr += idx;
          }
        }
        if (state === 'u') idxStr += '}';
        if (state === 'l') idxStr += '}';
        return idxStr;
      }

      function negateLatex(v) {
        // Return the additive negation of a LaTeX value string
        if (v.charAt(0) === '-') return v.slice(1);
        return '-' + v;
      }

      function renderComponents(items, upperLabel, convention) {
        if (!items || items.length === 0) return '<span class="mfs-zero">all vanish</span>';
        var conv = (convention || 'ull').toLowerCase();

        // Group items by value, also merging negatives into existing groups
        var groups = [];
        var seen   = {};  // value -> group index
        items.forEach(function(c) {
          var v    = c.value;
          var negv = negateLatex(v);
          if (seen[v] !== undefined) {
            groups[seen[v]].items.push({ c: c, negated: false });
          } else if (seen[negv] !== undefined) {
            groups[seen[negv]].items.push({ c: c, negated: true });
          } else {
            seen[v] = groups.length;
            groups.push({ value: v, items: [{ c: c, negated: false }] });
          }
        });

        return groups.map(function(g) {
          var lhs = g.items.map(function(entry) {
            var label = upperLabel + makeIdxStr(entry.c, conv);
            return entry.negated ? '-' + label : label;
          }).join(' = ');
          return '<div class="mfs-component">' + tex(lhs + ' = ' + g.value) + '</div>';
        }).join('');
      }

      function renderScalar(str) {
        // If the scalar is zero (e.g. "R = 0"), show "vanishing" instead
        if (/=\s*0\s*$/.test(str.trim())) {
          return '<span class="mfs-zero">vanishing</span>';
        }
        return '<div class="mfs-component">' + tex(str) + '</div>';
      }


      // Render the index position widget for a given convention string (e.g. 'ull').
      // Only the first index is togglable; the rest are fixed lower.
      // Render index widget. For tensors with all-fixed lower indices except first (ull, ulll, llll etc.),
      // only the first column is togglable. For rank-2 symmetric tensors (uu/ul/ll), both columns toggle.
      function renderConventionWidget(convention, tensorId) {
        var symmetric = convention.length === 2;  // Ricci, Einstein
        var cols = '';
        for (var i = 0; i < convention.length; i++) {
          var isToggle = (i === 0) || symmetric;
          var cur = convention[i];
          var topSel = cur === 'u' ? ' mfs-idx-on' : '';
          var botSel = cur === 'l' ? ' mfs-idx-on' : '';
          if (isToggle) {
            cols += [
              '<div class="mfs-idx-col mfs-idx-col-toggle" data-colidx="' + i + '">',
                '<div class="mfs-idx-box' + topSel + '" data-pos="u" data-colidx="' + i + '"></div>',
                '<div class="mfs-idx-box' + botSel + '" data-pos="l" data-colidx="' + i + '"></div>',
              '</div>'
            ].join('');
          } else {
            cols += [
              '<div class="mfs-idx-col mfs-idx-col-fixed">',
                '<div class="mfs-idx-spacer"></div>',
                '<div class="mfs-idx-box mfs-idx-on mfs-idx-fixed"></div>',
              '</div>'
            ].join('');
          }
        }
        return [
          '<div class="mfs-idx-widget" data-tensor="' + tensorId + '" data-convention="' + convention + '">',
            cols,
          '</div>'
        ].join('');
      }

      function renderMetric(data, coordIdx) {
        _currentMetric  = data;
        _currentCoordIdx = coordIdx;
        var coord = data.coordinates[coordIdx];

        // Coordinate selector
        var coordOptions = data.coordinates.map(function(c, i) {
          return '<option value="' + i + '"' + (i === coordIdx ? ' selected' : '') + '>' + c.name + '</option>';
        }).join('');

        // Geodesic toggle — default massive
        var html = [
          '<div class="mfs-header">',
            '<div class="mfs-label">metric</div>',
            '<div class="mfs-title">' + data.name + '</div>',
          '</div>',

          data.history ? [
            '<div class="mfs-section">',
              '<div class="mfs-section-label">history</div>',
              '<div class="mfs-history">' + data.history.split('¶').map(function(p) { return '<p>' + p.trim() + '</p>'; }).join('') + '</div>',
            '</div>'
          ].join('') : '',

          '<div class="mfs-section">',
            '<div class="mfs-section-label">coordinates</div>',
            '<select class="mfs-coord-select" id="mfs-coord-select">' + coordOptions + '</select>',
            coord.domains && coord.domains.length ? [
              '<div class="mfs-domains">',
                coord.domains.map(function(d) {
                  return '<div class="mfs-component">' + tex(d) + '</div>';
                }).join(''),
              '</div>'
            ].join('') : '',
          '</div>',

          '<div class="mfs-section">',
            '<div class="mfs-section-label">line element</div>',
            '<div class="mfs-component">' + tex(coord.line_element) + '</div>',
          '</div>',

          (function() {
            var chConv = coord.christoffel.default;
            var chV    = coord.christoffel.variants[chConv];
            return [
              '<div class="mfs-section" id="mfs-sec-christoffel">',
                '<div class="mfs-section-head">',
                  '<div class="mfs-section-label">Christoffel symbols</div>',
                  renderConventionWidget(chConv, 'christoffel'),
                '</div>',
                '<div id="mfs-comp-christoffel">',
                  renderComponents(chV.nonzero, '\\Gamma', chConv),
                '</div>',
              '</div>'
            ].join('');
          })(),

          (function() {
            var rConv = coord.riemann.default;
            var rV    = coord.riemann.variants[rConv];
            return [
              '<div class="mfs-section" id="mfs-sec-riemann">',
                '<div class="mfs-section-head">',
                  '<div class="mfs-section-label">Riemann tensor</div>',
                  renderConventionWidget(rConv, 'riemann'),
                '</div>',
                '<div id="mfs-comp-riemann">',
                  renderComponents(rV.nonzero, 'R', rConv),
                '</div>',
              '</div>'
            ].join('');
          })(),

          (function() {
            var rConv = coord.ricci_tensor.default;
            var rV    = coord.ricci_tensor.variants[rConv];
            return [
              '<div class="mfs-section" id="mfs-sec-ricci">',
                '<div class="mfs-section-head">',
                  '<div class="mfs-section-label">Ricci tensor</div>',
                  renderConventionWidget(rConv, 'ricci'),
                '</div>',
                '<div id="mfs-comp-ricci">',
                  renderComponents(rV.nonzero, 'R', rConv),
                '</div>',
              '</div>'
            ].join('');
          })(),

          '<div class="mfs-section">',
            '<div class="mfs-section-label">Ricci scalar</div>',
            renderScalar(coord.ricci_scalar),
          '</div>',

          '<div class="mfs-section">',
            '<div class="mfs-section-label">Kretschmann scalar</div>',
            renderScalar(coord.kretschmann),
          '</div>',

          (function() {
            var eConv = coord.einstein_tensor.default;
            var eV    = coord.einstein_tensor.variants[eConv];
            return [
              '<div class="mfs-section" id="mfs-sec-einstein">',
                '<div class="mfs-section-head">',
                  '<div class="mfs-section-label">Einstein tensor</div>',
                  renderConventionWidget(eConv, 'einstein'),
                '</div>',
                '<div id="mfs-comp-einstein">',
                  renderComponents(eV.nonzero, 'G', eConv),
                '</div>',
              '</div>'
            ].join('');
          })(),

          coord.weyl_tensor ? (function() {
            var wConv = coord.weyl_tensor.default;
            var wV    = coord.weyl_tensor.variants[wConv];
            return [
              '<div class="mfs-section" id="mfs-sec-weyl">',
                '<div class="mfs-section-head">',
                  '<div class="mfs-section-label">Weyl tensor</div>',
                  renderConventionWidget(wConv, 'weyl'),
                '</div>',
                '<div id="mfs-comp-weyl">',
                  renderComponents(wV.nonzero, 'C', wConv),
                '</div>',
              '</div>'
            ].join('');
          })() : '',

          coord.geodesics ? [
            '<div class="mfs-section">',
              '<div class="mfs-section-label">Geodesics</div>',
              (Array.isArray(coord.geodesics) ? coord.geodesics : (coord.geodesics.massive || [])).map(function(eq) {
                return '<div class="mfs-component">' + tex(eq) + '</div>';
              }).join(''),
            '</div>'
          ].join('') : '',

          (data.references && data.references.length) ? [
            '<div class="mfs-section mfs-references">',
              '<div class="mfs-section-label">references</div>',
              data.references.map(function(key) {
                var entry = _bibCache && _bibCache[key];
                if (!entry) return '<div class="mfs-reference mfs-ref-missing">' + key + '</div>';
                return '<div class="mfs-reference">' + formatBibtex(entry) + '</div>';
              }).join(''),
            '</div>'
          ].join('') : ''
        ].join('');

        contentPanel.innerHTML = html;

        // Force column reflow after MathJax typesetting
        function reflowColumns() {
          var compIds = ['mfs-comp-christoffel','mfs-comp-riemann','mfs-comp-ricci','mfs-comp-einstein','mfs-comp-weyl'];
          compIds.forEach(function(id) {
            var el = document.getElementById(id);
            if (!el) return;
            el.style.columnCount = 'auto';
            el.style.columnWidth = '';
            void el.offsetWidth;
            // Measure widest component using getBoundingClientRect in single-col mode
            el.style.columnCount = '1';
            void el.offsetWidth;
            var maxW = 0;
            el.querySelectorAll('.mfs-component').forEach(function(child) {
              var r = child.getBoundingClientRect();
              if (r.width > maxW) maxW = r.width;
            });
            if (maxW < 50) maxW = 400; // fallback
            var panelW = el.getBoundingClientRect().width;
            var gap = 24;
            var count = Math.max(1, Math.floor((panelW + gap) / (maxW + gap)));
            el.style.columnCount = String(count);
          });
        }

        // Wire coordinate selector
        document.getElementById('mfs-coord-select').addEventListener('change', function() {
          renderMetric(data, parseInt(this.value));
        });

        // Wire convention widgets
        var tensorMeta = {
          christoffel: { label: '\\Gamma', variants: coord.christoffel.variants },
          riemann:     { label: 'R',       variants: coord.riemann.variants },
          ricci:       { label: 'R',       variants: coord.ricci_tensor.variants },
          einstein:    { label: 'G',       variants: coord.einstein_tensor.variants },
          weyl:        coord.weyl_tensor ? { label: 'C', variants: coord.weyl_tensor.variants } : null
        };
        contentPanel.querySelectorAll('.mfs-idx-widget').forEach(function(widget) {
          var tensorId = widget.dataset.tensor;
          var meta = tensorMeta[tensorId];
          if (!meta) return;
          widget.querySelectorAll('.mfs-idx-box[data-pos]').forEach(function(box) {
            box.addEventListener('click', function() {
              var colIdx  = parseInt(box.dataset.colidx);
              var pos     = box.dataset.pos;
              var oldConv = widget.dataset.convention;
              // Build new convention string with this column set to pos
              var chars = oldConv.split('');
              chars[colIdx] = pos;
              var rawConv = chars.join('');
              // Canonicalize: for rank-2 symmetric, ul=lu → always 'ul'
              var canonical = rawConv;
              if (rawConv === 'lu') canonical = 'ul';
              // Only switch if this variant exists
              if (!meta.variants[canonical]) return;
              widget.dataset.convention = canonical;
              // Update highlights for each toggleable column
              widget.querySelectorAll('.mfs-idx-box[data-pos]').forEach(function(b) {
                var bCol = parseInt(b.dataset.colidx);
                b.classList.toggle('mfs-idx-on', b.dataset.pos === canonical[bCol]);
              });
              // Re-render components
              var compEl = document.getElementById('mfs-comp-' + tensorId);
              if (compEl) {
                compEl.innerHTML = renderComponents(meta.variants[canonical].nonzero, meta.label, canonical);
                if (window.MathJax && MathJax.typesetPromise) {
                  MathJax.typesetPromise([compEl]).then(reflowColumns);
                } else {
                  reflowColumns();
                }
              }
            });
          });
        });


        // Typeset MathJax
        if (window.MathJax && MathJax.typesetPromise) {
          MathJax.typesetPromise([contentPanel]).then(reflowColumns);
        } else {
          reflowColumns();
        }
      }

      // Expose so search panel can call it
      window._mfsShowMetric = function(id) {
        var el = document.getElementById('mfs-content-panel');
        var SLIDE_DUR = 350;
        var isVisible = el && (el.style.transform === 'translateX(0px)' || el.style.transform === 'translateX(0)');
        if (isVisible) {
          el.style.transition    = 'transform ' + SLIDE_DUR + 'ms cubic-bezier(0.55, 0.06, 0.68, 0.19)';
          el.style.transform     = 'translateX(100%)';
          el.style.pointerEvents = 'none';
          setTimeout(function() {
            fetchBib(function() {
              fetchMetric(id, function(data) {
                renderMetric(data, 0);
                el.scrollTop = 0;
                el.style.transition = 'transform ' + SLIDE_DUR + 'ms cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                el.style.transform  = 'translateX(0)';
                setTimeout(function() {
                  el.style.pointerEvents = 'all';
                  el.style.transition    = '';
                }, SLIDE_DUR);
              });
            });
          }, SLIDE_DUR);
        } else {
          fetchBib(function() {
            fetchMetric(id, function(data) { renderMetric(data, 0); });
          });
        }
      };

    })();
  </script>

  <style>

    #mfs-content-panel .mfs-header {
      padding: 10px 16px 8px;
      border-bottom: 1px solid rgba(0,229,255,0.2);
      position: sticky; top: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1;
    }

      font-size: 21px; color: rgba(0,229,255,0.5);
      letter-spacing: 0.12em; text-transform: uppercase;
    }

      font-size: 40px; font-weight: 600;
      letter-spacing: 0.05em; margin: 2px 0 6px;
      color: var(--cyan);
    }
    #mfs-content-panel .mfs-coord-select {
      width: 100%; background: rgba(0,26,26,0.9);
      border: 1px solid rgba(0,229,255,0.4);
      color: var(--cyan);
      font-family: 'Source Code Pro', monospace;
      font-size: 26px; padding: 4px 6px;
      border-radius: 4px; outline: none;
    }

      padding: 8px 16px;
      border-bottom: 1px solid rgba(0,229,255,0.12);
    }
    #mfs-content-panel .mfs-section-head {
      display: flex; justify-content: space-between; align-items: center;
    }
    #mfs-content-panel .mfs-section-label {
      font-size: 21px; color: rgba(0,229,255,0.5);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 4px;
    }
    #mfs-content-panel .mfs-convention {
      font-size: 21px; color: rgba(0,229,255,0.4);
      letter-spacing: 0.06em;
    }
    #mfs-content-panel .mfs-component {
      font-size: 27px; color: var(--teal-light);

    #mfs-comp-christoffel .mfs-component,
    #mfs-comp-riemann .mfs-component,

      font-size: 21px !important; color: var(--teal-light) !important;
      line-height: 1.7 !important; opacity: 0.8;

    #mfs-content-panel .mfs-history p {
      font-family: 'Source Code Pro', monospace !important;
      font-size: 1em !important; color: var(--teal-light) !important;
      line-height: 1.7 !important;
      margin: 0 0 0.9em !important;
    }

      margin-bottom: 0 !important;
    }
    #mfs-content-panel .mfs-zero {
      font-size: 26px; color: rgba(0,229,255,0.35);
      font-style: italic;
    }
    #mfs-content-panel .mfs-idx-widget {
      display: flex; flex-direction: row; align-items: flex-end; gap: 3px;
    }
    #mfs-content-panel .mfs-idx-col {
      display: flex; flex-direction: column; gap: 3px; align-items: center;
    }
    #mfs-content-panel .mfs-idx-spacer {
      width: 18px; height: 18px;
    }
    #mfs-content-panel .mfs-idx-box {
      width: 18px; height: 18px;
      border: 1.5px solid rgba(0,229,255,0.25);
      border-radius: 3px;
      box-sizing: border-box;
      cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    #mfs-content-panel .mfs-idx-box.mfs-idx-on {
      border-color: var(--cyan);
      box-shadow: 0 0 4px var(--cyan), 0 0 10px var(--cyan);
    }
    #mfs-content-panel .mfs-idx-box.mfs-idx-fixed {
      cursor: default;
    }
    #mfs-content-panel .mfs-idx-col-toggle .mfs-idx-box:not(.mfs-idx-on):hover {
      border-color: rgba(0,229,255,0.5);
    }
    #mfs-content-panel .mfs-references {
      margin-top: 8px;
    }
    #mfs-content-panel .mfs-reference {
      font-size: 16px; color: rgba(0,229,255,0.5);
      line-height: 1.7; margin-bottom: 12px;
      word-break: break-word;
    }
    #mfs-content-panel .mfs-ref-author  { color: var(--teal-light); }
    #mfs-content-panel .mfs-ref-year    { color: rgba(0,229,255,0.4); }
    #mfs-content-panel .mfs-ref-title   { font-style: italic; color: rgba(0,229,255,0.7); }
    #mfs-content-panel .mfs-ref-journal { color: rgba(0,229,255,0.5); }
    #mfs-content-panel .mfs-ref-volume  { color: rgba(0,229,255,0.4); }
  </style>

  <script>
    /* ── MFS exit transition: ramp scale down then navigate ── */
    (function() {
      // delegate so it works whether the link was in the original DOM or swapped in
      document.addEventListener('click', function(e) {
        var exitLink = e.target.closest('#mfs-exit');
        if (!exitLink) return;
        e.preventDefault();
        var href         = exitLink.getAttribute('href') || '/';
        var RAMP_MS = 1000;
        var titleEl      = document.getElementById('mfs-title');
        var exitEl       = document.getElementById('mfs-exit');
        var cs2          = getComputedStyle(document.documentElement);
        var tealLight2   = cs2.getPropertyValue('--teal-light').trim();
        var pinkLight2   = cs2.getPropertyValue('--pink-light').trim();
        var FLICKER_MS2  = 180;

        function flickerOutLetter(span, startTime, endTime) {
          var now = Date.now();
          if (now < endTime) {
            var r = Math.random();
            if (r < 0.45) {
              span.style.opacity    = '1';
              span.style.color      = tealLight2;
              span.style.textShadow = '0 0 8px ' + tealLight2 + ', 0 0 20px ' + tealLight2 + ', 0 0 40px ' + tealLight2;
            } else if (r < 0.65) {
              span.style.opacity    = '0.15';
              span.style.textShadow = 'none';
            } else if (r < 0.85) {
              span.style.opacity    = '1';
              span.style.color      = pinkLight2;
              span.style.textShadow = '0 0 8px ' + pinkLight2 + ', 0 0 20px ' + pinkLight2;
            } else {
              span.style.opacity = '0.5';
            }
            setTimeout(function() { flickerOutLetter(span, startTime, endTime); }, 30 + Math.random() * 40);
          } else {
            span.style.opacity    = '0';
            span.style.textShadow = 'none';
          }
        }

        function flickerOutEl(el) {
          if (!el) return;
          var allSpans = el.querySelectorAll('span');
          if (!allSpans.length) return;
          var indices = Array.prototype.slice.call(allSpans).map(function(_, i) { return i; });
          // shuffle
          for (var i = indices.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
          }
          var spread = RAMP_MS * 0.7;
          indices.forEach(function(idx, order) {
            var delay   = Math.random() * spread;
            var endTime = Date.now() + delay + FLICKER_MS2;
            setTimeout(function() {
              flickerOutLetter(allSpans[idx], Date.now(), endTime);
            }, delay);
          });
        }

        flickerOutEl(titleEl);
        flickerOutEl(exitEl);
        if (window._mfsTrackEl) {
          window._mfsTrackEl(titleEl, 0);
          window._mfsTrackEl(exitEl,  1);
        }

        // slide search panel back out to the left
        var searchPanel = document.getElementById('mfs-search-panel');
        if (searchPanel) {
          var panelW = searchPanel.offsetWidth;
          searchPanel.style.transition = 'left ' + (RAMP_MS * 0.6 / 1000) + 's cubic-bezier(0.55, 0.06, 0.68, 0.19)';
          searchPanel.style.left = (-panelW - 20) + 'px';
        }
        // slide content panel back out to the right
        if (window._mfsSlideOutRight) window._mfsSlideOutRight(RAMP_MS * 0.6);

        window._mfsRampDown(RAMP_MS, function() {
          window.location.href = href + '?from=mfs';
        });
      });
    })();
  </script>
